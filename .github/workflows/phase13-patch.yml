name: phase13 publication actions patch

on:
  push:
    branches:
      - agent/phase13-publication-actions

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase13-publication-actions
          fetch-depth: 0

      - name: Apply exact publication patch
        run: python scripts/_phase13_patch.py

      - name: Commit patched sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Фаза 13: вынести application actions публикаций"
          git push origin HEAD:agent/phase13-publication-actions
