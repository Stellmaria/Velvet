name: apply workspace forum guards

on:
  push:
    branches:
      - agent/workspace-first-run-wizard

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/workspace-first-run-wizard
      - name: Patch conflict handling
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          domain_path = Path("velvet_bot/domains/workspaces/onboarding.py")
          domain = domain_path.read_text(encoding="utf-8")
          if "import asyncpg\n" not in domain:
              domain = domain.replace(
                  "from __future__ import annotations\n\n",
                  "from __future__ import annotations\n\nimport asyncpg\n\n",
                  1,
              )

          method = domain.index("    async def upsert_destination(")
          next_method = domain.index("    async def delete_destination(", method)
          segment = domain[method:next_method]
          if "except asyncpg.UniqueViolationError" not in segment:
              body_start = domain.index(
                  "        async with self._database.acquire() as connection:",
                  method,
              )
              body_end = domain.index("        if row is None:", body_start)
              block = domain[body_start:body_end]
              indented = "".join(
                  ("    " + line if line.strip() else line)
                  for line in block.splitlines(keepends=True)
              )
              replacement = (
                  "        try:\n"
                  + indented
                  + "        except asyncpg.UniqueViolationError as error:\n"
                  + "            raise ValueError(\n"
                  + "                \"Этот Telegram-чат уже подключён к другому пространству.\"\n"
                  + "            ) from error\n"
              )
              domain = domain[:body_start] + replacement + domain[body_end:]
          domain_path.write_text(domain, encoding="utf-8")

          def wrap_upsert(path: Path) -> None:
              text = path.read_text(encoding="utf-8")
              marker = "    destination = await repository.upsert_destination("
              if marker not in text or "Этот Telegram-чат уже подключён" in text:
                  return
              start = text.index(marker)
              end = text.index("\n    )", start) + len("\n    )")
              block = text[start:end]
              indented = "\n".join("    " + line for line in block.splitlines())
              wrapped = (
                  "    try:\n"
                  + indented
                  + "\n    except ValueError as error:\n"
                  + "        await message.answer(escape(str(error)))\n"
                  + "        return"
              )
              path.write_text(text[:start] + wrapped + text[end:], encoding="utf-8")

          wrap_upsert(
              Path("velvet_bot/presentation/telegram/routers/workspace_onboarding.py")
          )
          wrap_upsert(
              Path(
                  "velvet_bot/presentation/telegram/routers/"
                  "workspace_onboarding_channel_bind.py"
              )
          )
          PY
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            velvet_bot/domains/workspaces/onboarding.py \
            velvet_bot/presentation/telegram/routers/workspace_onboarding.py \
            velvet_bot/presentation/telegram/routers/workspace_onboarding_channel_bind.py
          if git diff --cached --quiet; then
            echo "Conflict handling already applied."
            exit 0
          fi
          git commit -m "Handle workspace destination ownership conflicts"
          git push origin HEAD:agent/workspace-first-run-wizard
