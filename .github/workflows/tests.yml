name: tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: velvet_test
          POSTGRES_USER: velvet
          POSTGRES_PASSWORD: velvet_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U velvet -d velvet_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://velvet:velvet_test_password@localhost:5432/velvet_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > unit-test-output.txt 2>&1
          status=$?
          cat unit-test-output.txt
          exit "$status"

      - name: Upload unit test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-output
          path: unit-test-output.txt
          if-no-files-found: error
          retention-days: 7
