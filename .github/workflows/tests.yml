name: tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > unit-test-output.txt 2>&1
          status=$?
          cat unit-test-output.txt
          exit "$status"

      - name: Upload unit test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-output
          path: unit-test-output.txt
          if-no-files-found: error
          retention-days: 7
