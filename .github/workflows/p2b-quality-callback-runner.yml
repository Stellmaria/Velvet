name: p2b quality callback runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-slice:
    if: github.head_ref == 'agent/p2b-quality-callback-ack'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2b-quality-callback-ack
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply callback slice
        run: python scripts/_p2b_quality_callback_slice.py

      - name: Commit callback slice
        run: |
          rm -f .github/workflows/p2b-quality-callback-runner.yml
          rm -f scripts/_p2b_quality_callback_slice.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P2B: подтвердить quality callbacks до reload"
          git push origin HEAD:agent/p2b-quality-callback-ack
