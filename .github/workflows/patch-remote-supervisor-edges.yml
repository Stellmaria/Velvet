name: patch remote supervisor edges

on:
  push:
    branches:
      - agent/remote-supervisor-console
    paths:
      - scripts/_patch_remote_supervisor_edges.py
      - .github/workflows/patch-remote-supervisor-edges.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/_patch_remote_supervisor_edges.py
      - .github/workflows/patch-remote-supervisor-edges.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remote-supervisor-console
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python scripts/_patch_remote_supervisor_edges.py
      - run: python -m compileall -q velvet_bot velvet_supervisor
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add velvet_supervisor/bootstrap.py velvet_supervisor/remote_console.py velvet_bot/handlers/supervisor_console.py
          git commit -m "Укрепить callback identity и Windows bootstrap"
          git push origin HEAD:agent/remote-supervisor-console
