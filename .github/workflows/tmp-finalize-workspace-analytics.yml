name: temporary finalize workspace analytics

on:
  push:
    branches:
      - agent/workspace-analytics
    paths:
      - .github/workflows/tmp-finalize-workspace-analytics.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-analytics
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Apply reviewed source patches
        run: |
          python - <<'PY'
          from pathlib import Path

          policy = Path("velvet_bot/core/access/policy.py")
          text = policy.read_text(encoding="utf-8")
          text = text.replace(
              '        "characterstats",\n        "prompt",',
              '        "characterstats",\n        "trackdiscussion",\n        "discussionstats",\n        "prompt",',
          )
          policy.write_text(text, encoding="utf-8")

          dashboard = Path("velvet_bot/analytics_dashboard.py")
          text = dashboard.read_text(encoding="utf-8")
          old = '''                c.universe,
                s.short_label,
                COUNT(DISTINCT p.publication_key) AS publication_count,
                COUNT(DISTINCT p.publication_key) FILTER (WHERE p.is_prompt)
                    AS prompt_count
            FROM channel_post_hashtags AS h
            JOIN channel_posts AS p ON p.id = h.post_id
            JOIN characters AS c ON c.id = h.character_id
            LEFT JOIN character_stories AS s ON s.id = c.story_id
            WHERE p.channel_id = $1
              AND ($2::TIMESTAMPTZ IS NULL OR p.posted_at >= $2)
            GROUP BY c.id, s.id
'''
          new = '''                c.universe,
                COALESCE(ws.short_label, s.short_label) AS short_label,
                COUNT(DISTINCT p.publication_key) AS publication_count,
                COUNT(DISTINCT p.publication_key) FILTER (WHERE p.is_prompt)
                    AS prompt_count
            FROM channel_post_hashtags AS h
            JOIN channel_posts AS p ON p.id = h.post_id
            JOIN characters AS c ON c.id = h.character_id
            LEFT JOIN workspace_character_story_links AS primary_link
              ON primary_link.workspace_id = c.workspace_id
             AND primary_link.character_id = c.id
             AND primary_link.is_primary
            LEFT JOIN workspace_stories AS ws
              ON ws.workspace_id = primary_link.workspace_id
             AND ws.id = primary_link.story_id
            LEFT JOIN character_stories AS s ON s.id = c.story_id
            WHERE p.channel_id = $1
              AND ($2::TIMESTAMPTZ IS NULL OR p.posted_at >= $2)
            GROUP BY c.id, s.id, ws.id
'''
          if old not in text:
              raise SystemExit("analytics dashboard character query block not found")
          dashboard.write_text(text.replace(old, new), encoding="utf-8")

          channel = Path("velvet_bot/channel_analytics.py")
          text = channel.read_text(encoding="utf-8")
          old = '''                c.universe,
                s.short_label AS story_short_label,
                s.title AS story_title,
                COUNT(DISTINCT p.publication_key) AS publication_count,
                COUNT(DISTINCT p.publication_key) FILTER (WHERE p.is_prompt)
                    AS prompt_count,
                MAX(p.posted_at) AS last_used_at
            FROM channel_post_hashtags AS h
            JOIN channel_posts AS p ON p.id = h.post_id
            JOIN characters AS c ON c.id = h.character_id
            LEFT JOIN character_stories AS s ON s.id = c.story_id
            WHERE p.channel_id = $1
            GROUP BY c.id, s.id
'''
          new = '''                c.universe,
                COALESCE(ws.short_label, s.short_label) AS story_short_label,
                COALESCE(ws.title, s.title) AS story_title,
                COUNT(DISTINCT p.publication_key) AS publication_count,
                COUNT(DISTINCT p.publication_key) FILTER (WHERE p.is_prompt)
                    AS prompt_count,
                MAX(p.posted_at) AS last_used_at
            FROM channel_post_hashtags AS h
            JOIN channel_posts AS p ON p.id = h.post_id
            JOIN characters AS c ON c.id = h.character_id
            LEFT JOIN workspace_character_story_links AS primary_link
              ON primary_link.workspace_id = c.workspace_id
             AND primary_link.character_id = c.id
             AND primary_link.is_primary
            LEFT JOIN workspace_stories AS ws
              ON ws.workspace_id = primary_link.workspace_id
             AND ws.id = primary_link.story_id
            LEFT JOIN character_stories AS s ON s.id = c.story_id
            WHERE p.channel_id = $1
            GROUP BY c.id, s.id, ws.id
'''
          if old not in text:
              raise SystemExit("channel analytics character query block not found")
          channel.write_text(text.replace(old, new), encoding="utf-8")

          tests = Path("tests/test_workspace_analytics.py")
          text = tests.read_text(encoding="utf-8")
          old = '''        with self.assertRaises(asyncpg.UniqueViolationError):
            await repository.upsert_channel(
                workspace_id=second.id,
                kind="analytics",
                chat_id=-100810001,
            )
'''
          new = '''        async with self.database.acquire() as connection:
            with self.assertRaises(asyncpg.UniqueViolationError):
                await connection.execute(
                    """
                    INSERT INTO workspace_channels (workspace_id, kind, chat_id)
                    VALUES ($1::BIGINT, 'analytics', $2::BIGINT)
                    """,
                    second.id,
                    -100810001,
                )
'''
          if old not in text:
              raise SystemExit("workspace channel trigger test block not found")
          tests.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Regenerate canonical inventories
        run: |
          python scripts/inventory_architecture_layout.py --write --label p3d-analytics-alias-retirement
          python scripts/inventory_repository_layout.py --write --label p3e-repository-layout-complete
          python scripts/telegram_navigation_inventory.py --root velvet_bot --markdown docs/generated/telegram_navigation_inventory.md
          python scripts/update_p2_stability_inventory.py --label workspace-analytics --schema-version 51
      - name: Commit and self-remove
        run: |
          rm .github/workflows/tmp-finalize-workspace-analytics.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize workspace analytics scope"
          git push origin HEAD:agent/workspace-analytics
