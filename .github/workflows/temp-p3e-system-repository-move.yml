name: temporary P3E system repository move

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  move:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/p3e-move-system-repository
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Migrate canonical imports and completion contract
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements_by_path = {
              Path('velvet_bot/app/bootstrap.py'): (
                  'from velvet_bot.repositories.system_repository import SystemRepository',
                  'from velvet_bot.infrastructure.postgres.system_repository import SystemRepository',
              ),
              Path('velvet_bot/services/system_health.py'): (
                  'from velvet_bot.repositories.system_repository import (',
                  'from velvet_bot.infrastructure.postgres.system_repository import (',
              ),
              Path('tests/test_phase18q_system_repository_boundary.py'): (
                  'from velvet_bot.repositories.system_repository import SystemRepository',
                  'from velvet_bot.infrastructure.postgres.system_repository import SystemRepository',
              ),
              Path('tests/test_phase6_runtime.py'): (
                  'from velvet_bot.repositories.system_repository import (',
                  'from velvet_bot.infrastructure.postgres.system_repository import (',
              ),
          }
          for path, (old, new) in replacements_by_path.items():
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one import in {path}, found {count}: {old}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          inventory_script = Path('scripts/inventory_repository_layout.py')
          text = inventory_script.read_text(encoding='utf-8')
          anchor = text.index('    first_candidate = candidates[0] if candidates else None')
          block_start = text.index('\n    if ', anchor) + 1
          block_end = text.index('\n\n    return {', block_start)
          completion_block = '''    if first_candidate is None:
              next_target = "repository layout migration complete"
              next_strategy = (
                  "keep root and central repository counts at zero and place new persistence "
                  "only in reviewed domain or infrastructure boundaries"
              )
          elif (
              int(first_candidate["production_consumer_count"]) == 0
              and int(first_candidate["test_consumer_count"]) == 0
              and int(first_candidate["package_export_count"]) > 0
          ):
              next_target = "retire the first export-only repository module"
              next_strategy = (
                  "remove the unused package export and dead module, then update the generated "
                  "baseline without creating a replacement facade"
              )
          elif int(first_candidate["reference_count"]) == 0:
              next_target = "retire the first unreferenced repository module"
              next_strategy = (
                  "verify dynamic imports remain absent, delete the dead module, and update the "
                  "generated baseline without creating a replacement facade"
              )
          else:
              next_target = "migrate the first low-coupling repository module"
              next_strategy = (
                  "move one reviewed module to its domain or infrastructure boundary, keep the old path "
                  "as a temporary facade, and migrate consumers before deletion"
              )'''
          inventory_script.write_text(
              text[:block_start] + completion_block + text[block_end:],
              encoding='utf-8',
          )

          for old_path in (
              Path('velvet_bot/repositories/system_repository.py'),
              Path('velvet_bot/repositories/__init__.py'),
          ):
              if not old_path.is_file():
                  raise SystemExit(f'old repository path not found: {old_path}')
              old_path.unlink()
          PY

      - name: Generate inventories
        run: |
          python scripts/inventory_repository_layout.py --write --label p3e-repository-layout-complete
          python scripts/inventory_architecture_layout.py --write --label p3d-analytics-alias-retirement

      - name: Commit move
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Move system repository into PostgreSQL infrastructure"
          git push origin HEAD:agent/p3e-move-system-repository
