name: temporary P3E system repository move

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  move:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/p3e-move-system-repository
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Migrate canonical imports and completion contract
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements_by_path = {
              Path('velvet_bot/app/bootstrap.py'): (
                  'from velvet_bot.repositories.system_repository import SystemRepository',
                  'from velvet_bot.infrastructure.postgres.system_repository import SystemRepository',
              ),
              Path('velvet_bot/services/system_health.py'): (
                  'from velvet_bot.repositories.system_repository import (',
                  'from velvet_bot.infrastructure.postgres.system_repository import (',
              ),
              Path('tests/test_phase18q_system_repository_boundary.py'): (
                  'from velvet_bot.repositories.system_repository import SystemRepository',
                  'from velvet_bot.infrastructure.postgres.system_repository import SystemRepository',
              ),
              Path('tests/test_phase6_runtime.py'): (
                  'from velvet_bot.repositories.system_repository import (',
                  'from velvet_bot.infrastructure.postgres.system_repository import (',
              ),
          }
          for path, (old, new) in replacements_by_path.items():
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'import not found in {path}: {old}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          inventory_script = Path('scripts/inventory_repository_layout.py')
          text = inventory_script.read_text(encoding='utf-8')
          marker = '''    if (
              first_candidate is not None
              and int(first_candidate["production_consumer_count"]) == 0
          '''
          replacement = '''    if first_candidate is None:
              next_target = "repository layout migration complete"
              next_strategy = (
                  "keep root and central repository counts at zero and place new persistence "
                  "only in reviewed domain or infrastructure boundaries"
              )
          elif (
              int(first_candidate["production_consumer_count"]) == 0
          '''
          if marker not in text:
              raise SystemExit('inventory completion marker not found')
          text = text.replace(marker, replacement, 1)
          old_elif = (
              '    elif first_candidate is not None '
              'and int(first_candidate["reference_count"]) == 0:'
          )
          new_elif = '    elif int(first_candidate["reference_count"]) == 0:'
          if old_elif not in text:
              raise SystemExit('inventory unreferenced marker not found')
          inventory_script.write_text(
              text.replace(old_elif, new_elif, 1),
              encoding='utf-8',
          )

          for old_path in (
              Path('velvet_bot/repositories/system_repository.py'),
              Path('velvet_bot/repositories/__init__.py'),
          ):
              if not old_path.is_file():
                  raise SystemExit(f'old repository path not found: {old_path}')
              old_path.unlink()
          PY

      - name: Generate inventories
        run: |
          python scripts/inventory_repository_layout.py --write --label p3e-repository-layout-complete
          python scripts/inventory_architecture_layout.py --write --label p3d-analytics-alias-retirement

      - name: Commit move
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Move system repository into PostgreSQL infrastructure"
          git push origin HEAD:agent/p3e-move-system-repository
