          replace_once(
              'velvet_supervisor/runtime.py',
              '            test_command=settings.test_command,\n'
              '        )\n',
              '            test_command=settings.test_command,\n'
              '            test_database_url=getattr(settings, "test_database_url", None),\n'
              '        )\n',
