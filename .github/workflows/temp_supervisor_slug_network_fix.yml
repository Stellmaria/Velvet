          )
          replace_once(
              'velvet_supervisor/git_ops.py',
              '        test_command: tuple[str, ...],\n'
              '    ) -> None:\n'
              '        self.project_dir = project_dir\n'
              '        self.timeout_seconds = timeout_seconds\n'
              '        self.test_command = test_command\n',
              '        test_command: tuple[str, ...],\n'
              '        test_database_url: str | None = None,\n'
              '    ) -> None:\n'
              '        self.project_dir = project_dir\n'
              '        self.timeout_seconds = timeout_seconds\n'
              '        self.test_command = test_command\n'
              '        self.test_database_url = test_database_url\n',
          )
          replace_once(
              'velvet_supervisor/git_ops.py',
              '    def run_tests(self, *, cwd: Path | None = None) -> CommandResult:\n'
              '        return self.run(\n'
              '            self.test_command,\n'
              '            cwd=cwd,\n'
              '            timeout_seconds=max(self.timeout_seconds, 1800),\n'
              '            check=False,\n'
              '        )\n',
              '    def _test_environment(self) -> dict[str, str]:\n'
              '        environment = os.environ.copy()\n'
              '        if self.test_database_url:\n'
              '            environment["TEST_DATABASE_URL"] = self.test_database_url\n'
              '        else:\n'
              '            environment.pop("TEST_DATABASE_URL", None)\n'
              '        environment.setdefault("PYTHONUTF8", "1")\n'
              '        environment.setdefault("PYTHONIOENCODING", "utf-8")\n'
              '        return environment\n\n'
              '    def run_tests(self, *, cwd: Path | None = None) -> CommandResult:\n'
              '        return self.run(\n'
              '            self.test_command,\n'
              '            cwd=cwd,\n'
