name: temp supervisor test slug network fix

on:
  push:
    branches:
      - agent/supervisor-test-slug-network-fix

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/supervisor-test-slug-network-fix
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Pattern not found in {path}: {old[:120]!r}')
              target.write_text(text.replace(old, new, 1), encoding='utf-8')

          def replace_regex(path: str, pattern: str, replacement: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'Regex count {count} in {path}: {pattern[:120]!r}')
              target.write_text(updated, encoding='utf-8')

          # Database integration tests use a dedicated schema. This path is only
          # activated by unittest when the exact TEST_DATABASE_URL is opened.
          replace_once(
              'velvet_bot/database.py',
              'import hashlib\nimport unicodedata\n',
              'import hashlib\nimport os\nimport re\nimport sys\nimport unicodedata\n',
          )
          replace_once(
              'velvet_bot/database.py',
              '_LEGACY_DUPLICATE_MIGRATION_NUMBERS = {\n'
              '    "003": frozenset({"003_character_references.sql", "003_public_archive.sql"}),\n'
              '}\n\n',
              '_LEGACY_DUPLICATE_MIGRATION_NUMBERS = {\n'
              '    "003": frozenset({"003_character_references.sql", "003_public_archive.sql"}),\n'
              '}\n'
              '_TEST_SCHEMA_RE = re.compile(r"^[a-z_][a-z0-9_]{0,62}$")\n\n\n'
              'def _isolated_test_schema(database_url: str) -> str | None:\n'
              '    """Resolve a private PostgreSQL schema only for unittest integration runs."""\n\n'
              '    configured_url = os.getenv("TEST_DATABASE_URL", "").strip()\n'
              '    if not configured_url or database_url.strip() != configured_url:\n'
              '        return None\n'
              '    if "unittest" not in " ".join(sys.argv).casefold():\n'
              '        return None\n\n'
              '    configured_schema = os.getenv("TEST_DATABASE_SCHEMA", "").strip().casefold()\n'
              '    if configured_schema:\n'
              '        if _TEST_SCHEMA_RE.fullmatch(configured_schema) is None:\n'
              '            raise RuntimeError(\n'
              '                "TEST_DATABASE_SCHEMA должен быть безопасным PostgreSQL identifier."\n'
              '            )\n'
              '        return configured_schema\n\n'
              '    fingerprint = hashlib.sha256(\n'
              '        f"{database_url}\\0{Path.cwd()}".encode("utf-8")\n'
              '    ).hexdigest()[:12]\n'
              '    return f"velvet_test_{fingerprint}"\n\n',
          )
          replace_once(
              'velvet_bot/database.py',
              '        self._pool: asyncpg.Pool | None = None\n\n'
              '    async def initialize(self) -> None:\n'
              '        self._pool = await asyncpg.create_pool(\n'
              '            dsn=self.database_url,\n'
              '            min_size=1,\n'
              '            max_size=10,\n'
              '            command_timeout=60,\n'
              '        )\n',
              '        self._pool: asyncpg.Pool | None = None\n'
              '        self._test_schema = _isolated_test_schema(database_url)\n\n'
              '    async def _prepare_test_schema(self) -> dict[str, str] | None:\n'
              '        if self._test_schema is None:\n'
              '            return None\n'
              '        try:\n'
              '            connection = await asyncpg.connect(\n'
              '                dsn=self.database_url,\n'
              '                command_timeout=60,\n'
              '            )\n'
              '            try:\n'
              '                await connection.execute(\n'
              '                    f\'CREATE SCHEMA IF NOT EXISTS "{self._test_schema}"\'\n'
              '                )\n'
              '            finally:\n'
              '                await connection.close()\n'
              '        except asyncpg.InsufficientPrivilegeError as error:\n'
              '            import unittest\n\n'
              '            raise unittest.SkipTest(\n'
              '                "Роль TEST_DATABASE_URL не может создать изолированную тестовую "\n'
              '                "схему. Укажите SUPERVISOR_TEST_DATABASE_URL для отдельной базы "\n'
              '                "или выдайте роли CREATE на тестовую базу."\n'
              '            ) from error\n'
              '        return {"search_path": f\'"{self._test_schema}"\'}\n\n'
              '    async def initialize(self) -> None:\n'
              '        server_settings = await self._prepare_test_schema()\n'
              '        self._pool = await asyncpg.create_pool(\n'
              '            dsn=self.database_url,\n'
              '            min_size=1,\n'
              '            max_size=10,\n'
              '            command_timeout=60,\n'
              '            server_settings=server_settings,\n'
              '        )\n',
          )

          # Personal workspace slugs no longer depend on a count that can be stale
          # after deletion, missing membership, or simultaneous creation requests.
          replace_once(
              'velvet_bot/domains/workspaces/product_service.py',
              'from dataclasses import dataclass\n',
              'from dataclasses import dataclass\nfrom uuid import uuid4\n',
          )
          replace_once(
              'velvet_bot/domains/workspaces/product_service.py',
              '            slug=f"user-{int(owner_user_id)}-{owned + 1}",\n',
              '            slug=f"user-{int(owner_user_id)}-{uuid4().hex[:12]}",\n',
          )

          # Transient Telegram transport failures are handled and logged at INFO,
          # while real handler defects remain CRITICAL incidents.
          replace_once(
              'velvet_bot/presentation/telegram/router.py',
              'from aiogram.types import ErrorEvent\n\n',
              'from aiogram.types import ErrorEvent\n\n'
              'from velvet_bot.infrastructure.transient_connections import (\n'
              '    is_transient_connection_error,\n'
              ')\n\n',
          )
          replace_once(
              'velvet_bot/presentation/telegram/router.py',
              '    async def handle_unhandled_error(event: ErrorEvent) -> bool:\n'
              '        # The root logging handler forwards this record, traceback included, to the\n'
              '        # persistent incident center. Do not send a second audit message here.\n'
              '        logger.critical(\n',
              '    async def handle_unhandled_error(event: ErrorEvent) -> bool:\n'
              '        if is_transient_connection_error(event.exception):\n'
              '            logger.info(\n'
              '                "Transient Telegram connection error recovered: %s",\n'
              '                event.exception,\n'
              '            )\n'
              '            return True\n'
              '        # The root logging handler forwards this record, traceback included, to the\n'
              '        # persistent incident center. Do not send a second audit message here.\n'
              '        logger.critical(\n',
          )

          replace_regex(
              'velvet_bot/runtime_stability.py',
              r'async def acknowledge_legacy_polling_noise\(repository: Any\) -> int:\n.*?\n\ndef install_runtime_stability',
              '''async def acknowledge_legacy_polling_noise(repository: Any) -> int:
    """Close old recoverable Telegram transport incidents so owner digests stay useful."""

    database = getattr(repository, "_database", None)
    if database is None:
        return 0

    async with database.acquire() as connection:
        result = await connection.execute(
            """
            UPDATE error_incidents
            SET acknowledged_at = COALESCE(acknowledged_at, NOW()),
                acknowledged_by = COALESCE(acknowledged_by, 0)
            WHERE acknowledged_at IS NULL
              AND (
                    (
                        logger_name = 'aiogram.dispatcher'
                        AND (
                              (
                                  LOWER(summary) LIKE '%failed to fetch updates%'
                                  AND LOWER(summary) LIKE '%telegramnetworkerror%'
                                  AND (
                                         LOWER(summary) LIKE '%serverdisconnectederror%'
                                      OR LOWER(summary) LIKE '%server disconnected%'
                                      OR LOWER(summary) LIKE '%clientconnectorerror%'
                                      OR LOWER(summary) LIKE '%cannot connect to host api.telegram.org%'
                                      OR LOWER(summary) LIKE '%превышен таймаут семафора%'
                                      OR LOWER(summary) LIKE '%semaphore timeout%'
                                      OR LOWER(summary) LIKE '%connection reset by peer%'
                                      OR LOWER(summary) LIKE '%connection timed out%'
                                  )
                              )
                              OR LOWER(summary) LIKE 'sleep for % seconds and try again%'
                        )
                    )
                    OR (
                        logger_name = 'velvet_bot.presentation.telegram.router'
                        AND LOWER(summary) LIKE '%unhandled bot error%'
                        AND (
                               LOWER(summary) LIKE '%clientconnectorerror%'
                            OR LOWER(summary) LIKE '%cannot connect to host api.telegram.org%'
                            OR LOWER(summary) LIKE '%превышен таймаут семафора%'
                            OR LOWER(summary) LIKE '%подключение к сети было разорвано%'
                            OR LOWER(summary) LIKE '%semaphore timeout%'
                            OR LOWER(summary) LIKE '%connection reset by peer%'
                            OR LOWER(summary) LIKE '%connection timed out%'
                        )
                    )
                  )
            """
        )
    try:
        return int(str(result).rsplit(" ", 1)[-1])
    except (TypeError, ValueError):
        return 0


def install_runtime_stability''',
          )

          # Supervisor post-update tests no longer inherit TEST_DATABASE_URL from
          # the bot process. A dedicated DSN must be explicitly configured.
          replace_once(
              'velvet_supervisor/config.py',
              '    codex_model: str | None = None\n',
              '    codex_model: str | None = None\n'
              '    test_database_url: str | None = None\n',
          )
          replace_once(
