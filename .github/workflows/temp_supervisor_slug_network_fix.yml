              '            codex_model=(\n'
              '                os.getenv("CODEX_MODEL", "gpt-5.3-codex").strip() or None\n'
              '            ),\n',
              '            codex_model=(\n'
              '                os.getenv("CODEX_MODEL", "gpt-5.3-codex").strip() or None\n'
              '            ),\n'
              '            test_database_url=(\n'
