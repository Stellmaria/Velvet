          replace_once(
              'velvet_supervisor/bootstrap.py',
              '    check: bool = True,\n'
              ') -> subprocess.CompletedProcess[str]:\n'
              '    completed = subprocess.run(\n',
              '    check: bool = True,\n'
              '    env: dict[str, str] | None = None,\n'
              ') -> subprocess.CompletedProcess[str]:\n'
              '    completed = subprocess.run(\n',
          )
          replace_once(
              'velvet_supervisor/bootstrap.py',
              '        env={**os.environ, "PYTHONUTF8": "1", "PYTHONIOENCODING": "utf-8"},\n',
              '        env={\n'
              '            **(os.environ if env is None else env),\n'
              '            "PYTHONUTF8": "1",\n'
              '            "PYTHONIOENCODING": "utf-8",\n'
              '        },\n',
          )
          replace_once(
              'velvet_supervisor/bootstrap.py',
              'def _lock_path(settings: SupervisorSettings) -> Path:\n',
              'def _test_environment(settings: SupervisorSettings) -> dict[str, str]:\n'
              '    environment = os.environ.copy()\n'
              '    test_database_url = getattr(settings, "test_database_url", None)\n'
              '    if test_database_url:\n'
              '        environment["TEST_DATABASE_URL"] = str(test_database_url)\n'
              '    else:\n'
              '        environment.pop("TEST_DATABASE_URL", None)\n'
              '    return environment\n\n\n'
              'def _lock_path(settings: SupervisorSettings) -> Path:\n',
          )
          replace_once(
              'velvet_supervisor/bootstrap.py',
              '        timeout=settings.command_timeout_seconds,\n'
              '        check=False,\n'
              '    )\n'
              '    if tests.returncode:\n',
              '        timeout=settings.command_timeout_seconds,\n'
              '        check=False,\n'
              '        env=_test_environment(settings),\n'
              '    )\n'
              '    if tests.returncode:\n',
          )

          replace_once(
              '.env.example',
              'SUPERVISOR_TEST_COMMAND=".venv314\\Scripts\\python.exe" -m unittest discover -s tests -v\n',
              'SUPERVISOR_TEST_COMMAND=".venv314\\Scripts\\python.exe" -m unittest discover -s tests -v\n'
              '# Отдельная тестовая БД для PostgreSQL integration tests во время update.\n'
              '# Если не задана, Supervisor запускает только тесты без TEST_DATABASE_URL.\n'
              'SUPERVISOR_TEST_DATABASE_URL=\n'
              '# Необязательное имя изолированной схемы внутри тестовой БД.\n'
              'TEST_DATABASE_SCHEMA=\n',
          )

          # Extend runtime stability assertions for root handler transport noise.
          replace_once(
              'tests/test_runtime_stability_hotfix.py',
              '        self.assertIn("sleep for % seconds and try again", query)\n',
              '        self.assertIn("sleep for % seconds and try again", query)\n'
              '        self.assertIn("velvet_bot.presentation.telegram.router", query)\n'
              '        self.assertIn("подключение к сети было разорвано", query)\n',
