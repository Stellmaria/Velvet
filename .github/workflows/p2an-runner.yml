name: p2an runner

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2an-media-save-stability'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply P2AN
        run: |
          python .github/scripts/p2an_apply.py
          python .github/scripts/p2an_docs.py
          python scripts/update_p2_stability_inventory.py --label p2an-media-save-stability --schema-version 42
          rm .github/scripts/p2an_apply.py
          rm .github/scripts/p2an_docs.py
          rm .github/workflows/p2an-runner.yml
      - name: Commit generated result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Complete P2AN media save stability"
          git push origin HEAD:${{ github.head_ref }}
