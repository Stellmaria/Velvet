name: apply public repository hardening

on:
  push:
    branches:
      - agent/public-repo-security-hardening

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/public-repo-security-hardening

      - name: Apply deterministic hardening patch
        run: |
          python - <<'PY'
          from __future__ import annotations

          import re
          from pathlib import Path


          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")


          def write(path: str, content: str) -> None:
              Path(path).write_text(content, encoding="utf-8")


          def replace(path: str, old: str, new: str, *, count: int | None = None) -> None:
              source = read(path)
              actual = source.count(old)
              if count is not None and actual != count:
                  raise RuntimeError(f"{path}: expected {count} occurrences, found {actual}: {old!r}")
              if actual == 0:
                  raise RuntimeError(f"{path}: missing replacement target: {old!r}")
              write(path, source.replace(old, new))


          replace(
              "velvet_bot/public_ui.py",
              "\nPUBLIC_DOWNLOAD_USER_ID = 8179531132\n",
              "",
              count=1,
          )
          replace(
              "velvet_bot/public_ui.py",
              "    viewer_user_id: int,\n    menu_page: int = 0,",
              "    viewer_user_id: int,\n    can_download: bool = False,\n    menu_page: int = 0,",
              count=1,
          )
          replace(
              "velvet_bot/public_ui.py",
              "    if viewer_user_id == PUBLIC_DOWNLOAD_USER_ID:",
              "    if can_download:",
              count=1,
          )

          write(
              "velvet_bot/public_manager_access.py",
              '''from __future__ import annotations

from aiogram.types import User

from velvet_bot.access import AccessPolicy


def has_public_manager_access(
    user: User | None,
    access_policy: AccessPolicy,
) -> bool:
    """Allow configured moderators and every configured bot owner."""
    return bool(
        user
        and (
            access_policy.allows_moderator_user(user)
            or access_policy.allows_user(user)
        )
    )
''',
          )

