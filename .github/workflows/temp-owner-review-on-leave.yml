name: temporary owner review patcher

on:
  push:
    branches:
      - agent/public-archive-owner-review-on-leave

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/public-archive-owner-review-on-leave
          fetch-depth: 0

      - name: Apply patch
        run: python scripts/temp_owner_review_on_leave_patch.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record Stell review when leaving archive card"
          git push origin HEAD:agent/public-archive-owner-review-on-leave
