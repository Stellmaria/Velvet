              "Всего: 100.": "Всего: 96.",
              "- Фаза 18V: `AIQualityRepository` и его активный schema compatibility facade, удалены 10 обращений и 2 production-файла; claim, lifecycle, dashboard и owner decisions переведены вместе.\n": "- Фаза 18V: `AIQualityRepository` и его активный schema compatibility facade, удалены 10 обращений и 2 production-файла; claim, lifecycle, dashboard и owner decisions переведены вместе.\n- Фаза 18W: `MediaAIRepository`, удалены 4 обращения и 1 production-файл; claim transaction, stale recovery, semantic profile persistence и aggregate summary сохранены.\n",
              "1. **Фаза 18W:** repository-контур `ai_vision.py`, 4 connection points.\n2. Error center и Ollama/resilient AI repositories отдельными срезами.": "1. **Фаза 18X:** `ErrorCenterRepository` в `error_center.py`, 8 connection points.\n2. Ollama и resilient AI repositories отдельными срезами.",
          }
          for old, new in replacements.items():
              assert old in text, old
              text = text.replace(old, new)
          inventory_md.write_text(text, encoding="utf-8")

          project_memory = root / "docs" / "project_memory.md"
          text = project_memory.read_text(encoding="utf-8")
          replacements = {
              "Дата актуализации: 17 июля 2026 года.": "Дата актуализации: 18 июля 2026 года.",
              "Статус: срезы 18A–18V реализованы, baseline продолжает уменьшаться.": "Статус: срезы 18A–18W реализованы, baseline продолжает уменьшаться.",
              "- 18V: `AIQualityRepository` и его активный schema compatibility facade.\n": "- 18V: `AIQualityRepository` и его активный schema compatibility facade;\n- 18W: `MediaAIRepository` в `ai_vision.py`.\n",
              "- после 18V: 100 обращений в 25 файлах;": "- после 18V: 100 обращений в 25 файлах;\n- после 18W: 96 обращений в 24 файлах;",
              "Следующий срез: **18W, repository-контур `ai_vision.py`**, 4 connection points.": "Следующий срез: **18X, `ErrorCenterRepository` в `error_center.py`**, 8 connection points.",
              "1. Фаза 18W: repository-контур `ai_vision.py`, baseline 100 → 96.\n2. Переводить error center и Ollama/resilient AI repositories отдельными срезами.": "1. Фаза 18X: `ErrorCenterRepository`, baseline 96 → 88.\n2. Переводить Ollama/resilient AI repositories отдельными срезами.",
          }
          for old, new in replacements.items():
              assert old in text, old
              text = text.replace(old, new)
          project_memory.write_text(text, encoding="utf-8")

