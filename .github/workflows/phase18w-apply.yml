              "Статус: срезы 18A–18V реализованы, работа продолжается.": "Статус: срезы 18A–18W реализованы, работа продолжается.",
              "- AI quality repository и его активный schema compatibility facade.\n": "- AI quality repository и его активный schema compatibility facade;\n- Media AI repository в `ai_vision.py`.\n",
              "- после 18V: 100 в 25 файлах;": "- после 18V: 100 в 25 файлах;\n- после 18W: 96 в 24 файлах;",
              "Следующий срез: **18W, repository-контур `ai_vision.py`**, 4 connection points. Ожидаемый baseline: 96 обращений в 24 файлах.": "Следующий срез: **18X, `ErrorCenterRepository` в `error_center.py`**, 8 connection points. Ожидаемый baseline: 88 обращений в 23 файлах.",
              "1. Фаза 18W: repository-контур `ai_vision.py`.\n2. Error center и Ollama/resilient AI repositories отдельными срезами.": "1. Фаза 18X: `ErrorCenterRepository` в `error_center.py`.\n2. Ollama/resilient AI repositories отдельными срезами.",
          }
          for old, new in replacements.items():
              assert old in text, old
