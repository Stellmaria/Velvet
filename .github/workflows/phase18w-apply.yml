          assert len(ai_entries) == 1 and ai_entries[0]["count"] == 4, ai_entries
          inventory["generated_from_commit"] = "bb6de424c35f0a5eb2a031599a43ab90e8143dea"
          inventory["total_external_findings"] = 96
          inventory["total_files"] = 24
          inventory["next_slice"] = {
