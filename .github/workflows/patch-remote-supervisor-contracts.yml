name: patch remote supervisor contracts

on:
  push:
    branches:
      - agent/remote-supervisor-console
    paths:
      - scripts/_patch_remote_supervisor_contracts.py
      - .github/workflows/patch-remote-supervisor-contracts.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/_patch_remote-supervisor-contracts.py
      - scripts/_patch_remote_supervisor_contracts.py
      - .github/workflows/patch-remote-supervisor-contracts.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remote-supervisor-console
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python scripts/_patch_remote_supervisor_contracts.py
      - run: python -m pip install -r requirements.txt
      - run: python -m unittest tests.test_inline_management_menus tests.test_project_integrity -v
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_inline_management_menus.py tests/test_project_integrity.py
          git commit -m "Обновить контракты меню для удалённого Supervisor"
          git push origin HEAD:agent/remote-supervisor-console
