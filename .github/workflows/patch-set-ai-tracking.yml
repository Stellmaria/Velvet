name: patch set ai tracking

on:
  push:
    branches:
      - agent/fix-ai-quality-operations-menu
    paths:
      - scripts/_patch_set_ai_tracking.py
      - .github/workflows/patch-set-ai-tracking.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/_patch_set_ai_tracking.py
      - .github/workflows/patch-set-ai-tracking.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-ai-quality-operations-menu
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply patch
        run: |
          set -o pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/_patch_set_ai_tracking.py")
          source = path.read_text(encoding="utf-8")
          source = source.replace("    callback_handler = '''", "    callback_handler = r'''", 1)
          source = source.replace("    command_handler = '''", "    command_handler = r'''", 1)
          path.write_text(source, encoding="utf-8")
          PY
          python scripts/_patch_set_ai_tracking.py 2>&1 | tee patch-set-ai.log

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-set-ai-log
          path: patch-set-ai.log

      - name: Validate syntax
        run: python -m compileall -q velvet_bot

      - name: Commit handler
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add velvet_bot/handlers/quality_set_ai.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Отслеживать AI-проверку медиасетов"
            git push origin HEAD:agent/fix-ai-quality-operations-menu
          fi
