name: regenerate workspace inventories

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - agent/workspace-first-run-wizard

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/workspace-first-run-wizard
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Regenerate P2 inventory
        run: >-
          python scripts/update_p2_stability_inventory.py
          --label workspace-first-run-wizard
          --schema-version 52
      - name: Commit exact generated inventory
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/p2_stability_inventory.json docs/p2_stability_inventory.md
          if git diff --cached --quiet; then
            echo "Inventory is already current."
            exit 0
          fi
          git commit -m "Refresh workspace wizard stability inventory"
          git push origin HEAD:agent/workspace-first-run-wizard
      - name: Upload generated inventories
        uses: actions/upload-artifact@v4
        with:
          name: workspace-generated-inventories
          path: |
            docs/p2_stability_inventory.json
            docs/p2_stability_inventory.md
          if-no-files-found: error
