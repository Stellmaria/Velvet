name: regenerate workspace inventories

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Regenerate inventories
        run: |
          python scripts/update_p2_stability_inventory.py --label workspace-commands-watermark-drafts --schema-version 63
          python scripts/inventory_repository_layout.py --write --label p3e-repository-layout-complete
          python scripts/telegram_navigation_inventory.py --root velvet_bot --markdown docs/generated/telegram_navigation_inventory.md

      - name: Commit generated inventories
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/p2_stability_inventory.json \
            docs/p2_stability_inventory.md \
            docs/repository_layout_inventory.json \
            docs/repository_layout_inventory.md \
            docs/generated/telegram_navigation_inventory.md
          if git diff --cached --quiet; then
            echo "Inventories are already current."
            exit 0
          fi
          git commit -m "Update workspace generated inventories"
          git push origin "HEAD:${{ github.head_ref }}"
