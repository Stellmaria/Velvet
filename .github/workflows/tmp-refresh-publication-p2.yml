name: temporary refresh publication p2 inventory

on:
  push:
    branches:
      - agent/workspace-publication-queues
    paths:
      - .github/workflows/tmp-refresh-publication-p2.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-publication-queues
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Refresh P2 inventory
        run: python scripts/update_p2_stability_inventory.py --label workspace-publication-queues --schema-version 50
      - name: Commit and self-remove
        run: |
          rm .github/workflows/tmp-refresh-publication-p2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refresh publication P2 inventory"
          git push origin HEAD:agent/workspace-publication-queues
