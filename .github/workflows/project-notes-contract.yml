name: project notes contract

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Finalize Qwen panel slice
        if: github.head_ref == 'agent/qwen-panel-mobile-navigation' && github.actor != 'github-actions[bot]'
        run: |
          python scripts/temp_qwen_mobile_patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add velvet_bot
          if ! git diff --cached --quiet; then
            git commit -m "Build Qwen panel and compact navigation"
            git push origin HEAD:agent/qwen-panel-mobile-navigation
          fi

      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Validate project memory and worklog
        run: python scripts/check_project_notes.py --base-ref "origin/${{ github.base_ref }}"
