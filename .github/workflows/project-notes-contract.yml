name: project notes contract

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Finalize P3A generated sources
        if: github.head_ref == 'agent/p3a-status-sync-final' && github.actor != 'github-actions[bot]'
        run: |
          python scripts/temp_p3a_finalize.py
          python scripts/inventory_architecture_layout.py --write --label p3d-analytics-alias-retirement
          python scripts/inventory_architecture_layout.py --check --label p3d-analytics-alias-retirement
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md scripts/inventory_architecture_layout.py docs/architecture_layout_inventory.json docs/architecture_layout_inventory.md
          if ! git diff --cached --quiet; then
            git commit -m "Finalize P3A architecture sources"
            git push origin HEAD:agent/p3a-status-sync-final
          fi

      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Validate project memory and worklog
        run: python scripts/check_project_notes.py --base-ref "origin/${{ github.base_ref }}"
