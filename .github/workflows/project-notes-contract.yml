name: project notes contract

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Validate project memory and worklog
        run: python scripts/check_project_notes.py --base-ref "origin/${{ github.base_ref }}"
