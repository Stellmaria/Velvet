name: project notes contract

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Synchronize P3A sources
        if: github.head_ref == 'agent/p3a-status-sync-v2' && github.actor != 'github-actions[bot]'
        run: |
          python scripts/temp_p3a_status_sync.py
          python scripts/inventory_architecture_layout.py --write --label p3a-status-sync
          python scripts/inventory_architecture_layout.py --check --label p3a-status-sync
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/development_status.md docs/project_memory.md docs/ARCHITECTURE_AUDIT.md CHANGELOG.md scripts/inventory_architecture_layout.py docs/architecture_layout_inventory.json docs/architecture_layout_inventory.md
          git commit -m "Synchronize P3 architecture status"
          git push origin HEAD:agent/p3a-status-sync-v2

      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Validate project memory and worklog
        run: python scripts/check_project_notes.py --base-ref "origin/${{ github.base_ref }}"
