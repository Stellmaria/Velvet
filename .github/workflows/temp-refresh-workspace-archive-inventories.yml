name: temporary refresh workspace archive inventories

on:
  push:
    branches:
      - agent/workspace-archive-isolation

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/workspace-archive-isolation
          fetch-depth: 0

      - name: Refresh generated inventories
        run: |
          python scripts/inventory_repository_layout.py \
            --write \
            --label p3e-repository-layout-complete
          python scripts/telegram_navigation_inventory.py \
            --root velvet_bot \
            --markdown docs/generated/telegram_navigation_inventory.md
          rm .github/workflows/temp-refresh-workspace-archive-inventories.yml

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refresh inventories for workspace archive isolation"
          git push origin HEAD:agent/workspace-archive-isolation
