name: p2s runner

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2s-error-center-markup-boundary'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2s-error-center-markup-boundary
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python scripts/update_p2_stability_inventory.py --label p2s-error-center-markup-boundary --schema-version 21
      - run: python .github/p2s_docs.py
      - name: Create worklog from template
        run: |
          cp docs/worklog/2026-07-18-p2r-character-topic-boundaries.md docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/P2R — character topic boundaries/P2S — error-center markup cleanup/' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/2026-07-18-p2r-character-topic-boundaries/2026-07-18-p2s-error-center-markup-boundary/g' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/Velvet Archive, P2R/Velvet Archive, P2S/' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's#agent/p2r-character-topic-boundaries#agent/p2s-error-center-markup-boundary#' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/eb017417f0a632fc9da12872dc855857fde5bcf2/20d610783fe6348d66952f9a54a1693c985634f3/' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/Логировать неожиданные ошибки create\/topic handlers./Проверить best-effort markup cleanup./' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/42 unresolved broad exceptions./40 unresolved broad exceptions./' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/Два markers, logging, tests и inventory./Marker, logging, tests и inventory./' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/Ошибка логируется и показывается; cancellation пробрасывается; CI зелёный./Ack сохраняется; cancellation пробрасывается; CI зелёный./' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/Use cases и success responses не меняются./Incident storage не меняется./' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/Две boundaries усилены. Baseline 42 → 40./Cleanup логируется. Baseline 40 → 39./' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/Миграции и команды не менялись./Миграции не менялись./' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/PR #168. Merge выполняется после зелёного финального CI./PR создаётся после generation./' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's/40 unresolved./39 unresolved./' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
          sed -i 's#velvet_bot/handlers/error_center.py#Первый AST target.#' docs/worklog/2026-07-18-p2s-error-center-markup-boundary.md
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/p2s_docs.py .github/workflows/p2s-runner.yml
          git add -A
          git commit -m "P2S update"
          git push origin HEAD:agent/p2s-error-center-markup-boundary
