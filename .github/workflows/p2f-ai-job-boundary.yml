name: p2f ai job boundary

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2f-ai-job-tracker-boundary'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2f-ai-job-tracker-boundary
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python .github/scripts/p2f_apply.py
      - name: Materialize contracts
        env:
          TEST_DATA: 
          WORKLOG_DATA:  oKQnJvYWQtZXhjZXB0aW9uIHRyaWFnZSDQsiBgdmVsdmV0X2JvdC9hcHAvYm9vdHN0cmFwLnB5YC4K      - name: Decode files
        run: |
          printf '%s' "$TEST_DATA" | base64 -d > tests/test_p2f_ai_job_tracker_boundary.py
          printf '%s' "$WORKLOG_DATA" | base64 -d > docs/worklog/2026-07-18-p2f-ai-job-tracker-boundary.md
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/scripts/p2f_apply.py .github/workflows/p2f-ai-job-boundary.yml
          git add -A
          git commit -m "P2F: classify AI job tracker boundary"
          git push origin HEAD:agent/p2f-ai-job-tracker-boundary
