name: Phase 18 completion runner

on:
  push:
    branches:
      - agent/phase18-completion

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/phase18-completion
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply Phase 18 completion
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import ast
          import json
          import re
          from pathlib import Path

          ROOT = Path.cwd()

          def read(path: str) -> str:
              return (ROOT / path).read_text(encoding="utf-8")

          def write(path: str, content: str) -> None:
              target = ROOT / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content.rstrip() + "\n", encoding="utf-8")

          def node_span(node: ast.AST) -> tuple[int, int]:
              decorators = getattr(node, "decorator_list", ())
              starts = [getattr(node, "lineno")]
              starts.extend(getattr(item, "lineno") for item in decorators)
              return min(starts) - 1, getattr(node, "end_lineno")

          def selected_nodes(source: str, names: set[str]) -> list[ast.AST]:
              tree = ast.parse(source)
              result: list[ast.AST] = []
              for node in tree.body:
                  if isinstance(node, (ast.ClassDef, ast.FunctionDef, ast.AsyncFunctionDef)):
                      if node.name in names:
                          result.append(node)
              missing = names - {getattr(node, "name") for node in result}
              if missing:
                  raise RuntimeError(f"Missing nodes: {sorted(missing)}")
              return result

          def extract_nodes(source: str, names: set[str]) -> str:
              lines = source.splitlines()
              parts = []
              for node in selected_nodes(source, names):
                  start, end = node_span(node)
                  parts.append("\n".join(lines[start:end]))
              return "\n\n\n".join(parts)

          def remove_nodes(source: str, names: set[str]) -> str:
              lines = source.splitlines()
              spans = sorted((node_span(node) for node in selected_nodes(source, names)), reverse=True)
              for start, end in spans:
                  del lines[start:end]
                  while start < len(lines) and not lines[start].strip():
                      del lines[start]
                  if start > 0 and lines[start - 1].strip():
                      lines.insert(start, "")
              return "\n".join(lines).rstrip() + "\n"

          def add_import(source: str, anchor: str, block: str) -> str:
              if block in source:
                  return source
              if source.count(anchor) != 1:
                  raise RuntimeError(f"Import anchor mismatch: {anchor!r}")
              return source.replace(anchor, anchor + block, 1)

          # 18AN: finish the service that was accidentally omitted from PR #143.
          write(
              "velvet_bot/media_set_actions.py",
              '''from __future__ import annotations

          import re

          import velvet_bot.media_sets as media_sets
          from velvet_bot.database import Database
          from velvet_bot.media_set_actions_repository import MediaSetActionsRepository
          from velvet_bot.media_sets import CreatedMediaSet

          _PROMPT_POST_URL_RE = re.compile(
              r"^https://t\\.me/(?:c/\\d+|[A-Za-z0-9_]+)/\\d+$",
              re.IGNORECASE,
          )
          _ORIGINAL_CREATE_MEDIA_SET = media_sets.create_media_set
          _INSTALLED = False


          def normalize_prompt_post_url(value: str) -> str:
              normalized = " ".join(str(value).split()).strip()
              if not _PROMPT_POST_URL_RE.fullmatch(normalized):
                  raise ValueError(
                      "Нужна ссылка на пост Telegram вида https://t.me/channel/123."
                  )
              return normalized


          async def set_media_set_prompt(
              database: Database,
              *,
              media_set_id: int,
              prompt_post_url: str,
          ) -> str:
              normalized = normalize_prompt_post_url(prompt_post_url)
              updated = await MediaSetActionsRepository(database).set_prompt_post_url(
                  media_set_id=int(media_set_id),
                  prompt_post_url=normalized,
              )
              if not updated:
                  raise ValueError("Сет больше не найден.")
              return normalized


          async def create_media_set_with_prompt(
              database: Database,
              *,
              candidate_id: int,
              created_by: int,
          ) -> CreatedMediaSet:
              created = await _ORIGINAL_CREATE_MEDIA_SET(
                  database,
                  candidate_id=int(candidate_id),
                  created_by=int(created_by),
              )
              if created.prompt_post_url:
                  await set_media_set_prompt(
                      database,
                      media_set_id=created.id,
                      prompt_post_url=created.prompt_post_url,
                  )
              return created


          create_media_set = create_media_set_with_prompt


          def install_media_set_actions() -> None:
              global _INSTALLED
              if _INSTALLED:
                  return
              media_sets.create_media_set = create_media_set_with_prompt
              _INSTALLED = True


          install_media_set_actions()

          __all__ = (
              "create_media_set",
              "create_media_set_with_prompt",
              "install_media_set_actions",
              "normalize_prompt_post_url",
              "set_media_set_prompt",
          )
          ''',
          )

          # 18AO: move duplicate-pair persistence behind a repository boundary.
          write(
              "velvet_bot/media_set_duplicate_actions_repository.py",
              '''from __future__ import annotations

          from velvet_bot.database import Database


          class MediaSetDuplicateActionsRepository:
              def __init__(self, database: Database) -> None:
                  self._database = database

              async def create_set_candidate_from_duplicate(
                  self,
                  *,
                  duplicate_candidate_id: int,
                  decided_by: int,
              ) -> int:
                  async with self._database.acquire() as connection:
                      async with connection.transaction():
                          row = await connection.fetchrow(
                              """
                              SELECT dc.first_media_id, dc.second_media_id, dc.similarity_score,
                                     m1.media_set_id AS first_set_id,
                                     m2.media_set_id AS second_set_id
                              FROM media_duplicate_candidates AS dc
                              JOIN media_files AS m1 ON m1.id = dc.first_media_id
                              JOIN media_files AS m2 ON m2.id = dc.second_media_id
                              WHERE dc.id = $1::BIGINT
                              FOR UPDATE OF dc, m1, m2
                              """,
                              int(duplicate_candidate_id),
                          )
                          if row is None:
                              raise ValueError("Пара больше не найдена.")
                          if row["first_set_id"] is not None or row["second_set_id"] is not None:
                              raise ValueError("Один из материалов уже входит в сет.")

                          media_ids = tuple(
                              sorted((int(row["first_media_id"]), int(row["second_media_id"])))
                          )
                          context = await connection.fetchrow(
                              """
                              SELECT
                                  COALESCE(
                                      ARRAY_AGG(DISTINCT c.name ORDER BY c.name)
                                          FILTER (WHERE c.id IS NOT NULL),
                                      ARRAY[]::VARCHAR[]
                                  ) AS characters,
                                  MAX(cm.prompt_post_url)
                                      FILTER (WHERE cm.prompt_post_url IS NOT NULL)
                                      AS prompt_post_url
                              FROM character_media AS cm
                              LEFT JOIN characters AS c ON c.id = cm.character_id
                              WHERE cm.media_id = ANY($1::BIGINT[])
                              """,
                              list(media_ids),
                          )
                          characters = tuple(
                              str(value)
                              for value in (context["characters"] if context else ())
                              if value
                          )
                          prompt_post_url = context["prompt_post_url"] if context else None
                          title = (
                              ("Сет: " + ", ".join(characters[:4]))[:160]
                              if characters
                              else "Новый медиасет"
                          )
                          key = f"visual:{media_ids[0]}:{media_ids[1]}"
                          score = max(65, int(row["similarity_score"]))
                          candidate_id = int(
                              await connection.fetchval(
                                  """
                                  INSERT INTO media_set_candidates (
                                      candidate_key, suggested_title, reason, score, prompt_post_url
                                  )
                                  VALUES ($1::TEXT, $2::VARCHAR, $3::TEXT, $4::SMALLINT, $5::TEXT)
                                  ON CONFLICT (candidate_key) DO UPDATE
                                  SET status = 'pending',
                                      suggested_title = EXCLUDED.suggested_title,
                                      reason = EXCLUDED.reason,
                                      score = EXCLUDED.score,
                                      prompt_post_url = COALESCE(
                                          media_set_candidates.prompt_post_url,
                                          EXCLUDED.prompt_post_url
                                      ),
                                      decided_by = NULL,
                                      decided_at = NULL,
                                      updated_at = NOW()
                                  RETURNING id
                                  """,
                                  key,
                                  title,
                                  "Сходная композиция или стиль, но материалы решено не считать дублями.",
                                  score,
                                  prompt_post_url,
                              )
                          )
                          for media_id in media_ids:
                              await connection.execute(
                                  """
                                  INSERT INTO media_set_candidate_items (
                                      candidate_id, media_id, selected, context_score, reason
                                  )
                                  VALUES ($1::BIGINT, $2::BIGINT, TRUE, $3::SMALLINT, $4::TEXT)
                                  ON CONFLICT (candidate_id, media_id) DO UPDATE
                                  SET selected = TRUE,
                                      context_score = EXCLUDED.context_score,
                                      reason = EXCLUDED.reason
                                  """,
                                  candidate_id,
                                  media_id,
                                  score,
                                  "Предложено из проверки похожей пары",
                              )
                          await connection.execute(
                              """
                              UPDATE media_duplicate_candidates
                              SET status = 'ignored', decided_by = $2::BIGINT,
                                  decided_at = NOW(), updated_at = NOW()
                              WHERE id = $1::BIGINT
                              """,
                              int(duplicate_candidate_id),
                              int(decided_by),
                          )
                  return candidate_id


          __all__ = ("MediaSetDuplicateActionsRepository",)
          ''',
          )
          write(
              "velvet_bot/media_set_duplicate_actions.py",
              '''from __future__ import annotations

          import velvet_bot.media_sets as media_sets
          from velvet_bot.database import Database
          from velvet_bot.media_set_duplicate_actions_repository import (
              MediaSetDuplicateActionsRepository,
          )

          _INSTALLED = False


          async def create_set_candidate_from_duplicate(
              database: Database,
              *,
              duplicate_candidate_id: int,
              decided_by: int,
          ) -> int:
              return await MediaSetDuplicateActionsRepository(
                  database
              ).create_set_candidate_from_duplicate(
                  duplicate_candidate_id=int(duplicate_candidate_id),
                  decided_by=int(decided_by),
              )


          def install_media_sets_compatibility() -> None:
              global _INSTALLED
              if _INSTALLED:
                  return
              media_sets.create_set_candidate_from_duplicate = create_set_candidate_from_duplicate
              _INSTALLED = True


          install_media_sets_compatibility()

          __all__ = (
              "create_set_candidate_from_duplicate",
              "install_media_sets_compatibility",
          )
          ''',
          )

          # Presentation cleanup: extract persistence helpers without touching Telegram handlers.
          path = "velvet_bot/handlers/quality_set_ai.py"
          source = read(path)
          class_names = {
              "SetMediaItem",
              "MediaSetBundle",
              "SetReportListItem",
              "SetReportPage",
          }
          function_names = {"_load_set", "_list_sets", "_latest_report", "_save_report"}
          repository_source = (
              "from __future__ import annotations\n\n"
              "import json\n"
              "from dataclasses import dataclass\n\n"
              "from velvet_bot.database import Database\n\n\n"
              + extract_nodes(source, class_names)
              + "\n\n\n"
              + extract_nodes(source, function_names).replace(
                  "database._require_pool().acquire()", "database.acquire()"
              )
              + "\n\n\n__all__ = (\n"
              + "".join(f'    "{name}",\n' for name in sorted(class_names | function_names))
              + ")\n"
          )
          write("velvet_bot/quality_set_ai_repository.py", repository_source)
          source = remove_nodes(source, class_names | function_names)
          source = add_import(
              source,
              "from velvet_bot.database import Database\n",
              "from velvet_bot.quality_set_ai_repository import (\n"
              "    MediaSetBundle,\n"
              "    SetMediaItem,\n"
              "    SetReportListItem,\n"
              "    SetReportPage,\n"
              "    _latest_report,\n"
              "    _list_sets,\n"
              "    _load_set,\n"
              "    _save_report,\n"
              ")\n",
          )
          write(path, source)

          path = "velvet_bot/handlers/quality_sets.py"
          source = read(path)
          function_names = {"_retire_weak_fallback_candidates", "_latest_ai_error"}
          repository_source = (
              "from __future__ import annotations\n\n"
              "from velvet_bot.database import Database\n\n\n"
              + extract_nodes(source, function_names).replace(
                  "database._require_pool().acquire()", "database.acquire()"
              )
              + "\n\n\n__all__ = (\n"
              + "".join(f'    "{name}",\n' for name in sorted(function_names))
              + ")\n"
          )
          write("velvet_bot/quality_sets_repository.py", repository_source)
          source = remove_nodes(source, function_names)
          source = add_import(
              source,
              "from velvet_bot.database import Database\n",
              "from velvet_bot.quality_sets_repository import (\n"
              "    _latest_ai_error,\n"
              "    _retire_weak_fallback_candidates,\n"
              ")\n",
          )
          write(path, source)

          path = "velvet_bot/handlers/reference_comparison.py"
          source = read(path)
          function_names = {"_save_report"}
          repository_source = (
              "from __future__ import annotations\n\n"
              "import json\n\n"
              "from velvet_bot.database import Database\n\n\n"
              + extract_nodes(source, function_names).replace(
                  "database._require_pool().acquire()", "database.acquire()"
              )
              + "\n\n\n__all__ = (\"_save_report\",)\n"
          )
          write("velvet_bot/reference_comparison_repository.py", repository_source)
          source = remove_nodes(source, function_names)
          source = add_import(
              source,
              "from velvet_bot.reference_comparison import ReferenceComparisonClient\n",
              "from velvet_bot.reference_comparison_repository import _save_report\n",
          )
          write(path, source)

          # Compatibility cleanup: use the canonical dashboard and the public DB boundary.
          write(
              "velvet_bot/discussion_dashboard_compat.py",
              '''from __future__ import annotations

          from velvet_bot.analytics_dashboard import (
              DiscussionDashboard,
              get_discussion_dashboard,
          )
          from velvet_bot.database import Database


          async def get_discussion_dashboard_compat(
              database: Database,
              chat_id: int,
              *,
              period: str,
          ) -> DiscussionDashboard:
              return await get_discussion_dashboard(
                  database,
                  int(chat_id),
                  period=period,
              )


          __all__ = ("get_discussion_dashboard_compat",)
          ''',
          )
          compat_path = "velvet_bot/quality_set_audit_compat.py"
          compat_source = read(compat_path).replace(
              "database._require_pool().acquire()", "database.acquire()"
          )
          write(compat_path, compat_source)

          # Machine baseline: Phase 18 is complete.
          write(
              "docs/private_pool_inventory.json",
              json.dumps(
                  {
                      "schema_version": 1,
                      "generated_from_commit": "phase18-completion",
                      "total_external_findings": 0,
                      "total_files": 0,
                      "next_slice": None,
                      "files": [],
                  },
                  ensure_ascii=False,
                  indent=2,
              ),
          )
          inventory_test_path = "tests/test_phase18m_private_pool_inventory.py"
          inventory_test = read(inventory_test_path)
          inventory_test = re.sub(
              r"self\.assertEqual\(\d+, len\(inventory\.external_findings\(findings\)\)\)",
              "self.assertEqual(0, len(inventory.external_findings(findings)))",
              inventory_test,
          )
          inventory_test = re.sub(
              r"self\.assertEqual\(\d+, len\(inventory\.summarize_external\(findings\)\)\)",
              "self.assertEqual(0, len(inventory.summarize_external(findings)))",
              inventory_test,
          )
          write(inventory_test_path, inventory_test)

          write(
              "docs/private_pool_inventory.md",
              '''# Инвентаризация приватной PostgreSQL-границы

          Дата закрытия: 18 июля 2026 года.

          ## Результат

          AST-сканирование production package `velvet_bot/` фиксирует:

          - 0 внешних обращений к `Database._require_pool()`;
          - 0 production-файлов в baseline;
          - внутреннее использование внутри класса `Database` остаётся разрешённой реализационной деталью;
          - новые внешние обращения по-прежнему блокируются CI.

          Фаза 18 завершена. Legacy query-модули, application services, Telegram handlers и активные compatibility-фасады больше не используют приватную PostgreSQL-границу.

          ## Архитектурный итог

          - media-set AI, prompt actions и duplicate actions используют repository boundaries;
          - SQL медиасетной AI-проверки и сравнения референсов вынесен из Telegram handlers;
          - старый discussion dashboard делегирует каноническому query;
          - quality-set compatibility использует публичный `Database.acquire()`;
          - baseline равен `0/0`.

          ## Контроль

          ```bash
          python scripts/inventory_private_pool.py --check-baseline
          ```

          Фаза 18 закрыта. Дальнейшие задачи относятся к общему P2/P3, а не к private-pool debt.
          ''',
          )

          completion_note = '''

          ## Завершение Фазы 18

          Фаза 18 полностью закрыта: private-pool baseline уменьшен с 130 обращений в 35 production-файлах до 0/0. Persistence медиасетов вынесен в repositories, SQL удалён из трёх Telegram handlers, discussion compatibility делегирует каноническому dashboard, а оставшийся quality-set facade использует публичную границу. Новые внешние `_require_pool()` блокируются AST-контрактом.
          '''
          for doc_path in ("docs/development_status.md", "docs/project_memory.md"):
              doc = read(doc_path)
              if "## Завершение Фазы 18" not in doc:
                  doc += completion_note
              doc = re.sub(
                  r"Статус: срезы 18A–18[A-Z]+ реализованы,.*",
                  "Статус: завершена, private-pool baseline 0/0.",
                  doc,
              )
              write(doc_path, doc)

          changelog = read("CHANGELOG.md")
          marker = "### Changed\n"
          bullet = (
              "\n- Фаза 18 завершена: private-pool baseline уменьшен с 130/35 до 0/0; "
              "media-set persistence вынесен в repositories, SQL удалён из AI/set/reference handlers, "
              "compatibility dashboard делегирует каноническому query.\n"
          )
          if "private-pool baseline уменьшен с 130/35 до 0/0" not in changelog:
              changelog = changelog.replace(marker, marker + bullet, 1)
          write("CHANGELOG.md", changelog)

          write(
              "docs/worklog/2026-07-18-phase18-completion.md",
              '''# Сессия: завершение Фазы 18

          - Дата: 2026-07-18
          - ID: `2026-07-18-phase18-completion`
          - Ветка: `agent/phase18-completion`
          - Статус: завершено

          ## Цель

          Исправить рассинхронизацию PR 18AM/18AN и полностью закрыть private PostgreSQL boundary debt.

          ## Выполнено

          - PR #142 слит до завершающего среза;
          - недостающий service-код 18AN восстановлен;
          - duplicate actions перенесены в repository;
          - четыре persistence-helper из `quality_set_ai.py` вынесены в repository module;
          - два persistence-helper из `quality_sets.py` вынесены в repository module;
          - сохранение reference comparison report вынесено из handler;
          - discussion compatibility делегирует каноническому dashboard;
          - quality-set compatibility использует публичный acquire;
          - baseline уменьшен с 12/7 до 0/0;
          - добавлен regression-контракт завершения Фазы 18.

          ## Критерии готовности

          - production package не содержит внешних `_require_pool()`;
          - handlers не владеют DB connection contexts;
          - repository modules используют `Database.acquire()`;
          - существующие публичные handler/helper имена сохранены импортами и wrappers;
          - полный PR CI зелёный.

          ## Следующий шаг

          Перейти к оставшимся P2-задачам: аудит долгих callbacks, широких `except Exception`, staging и эксплуатационные проверки Supervisor.
          ''',
          )

          write(
              "tests/test_phase18_completion.py",
              '''from __future__ import annotations

          import inspect
          import json
          import unittest
          from pathlib import Path

          import velvet_bot.discussion_dashboard_compat as discussion_compat
          import velvet_bot.handlers.quality_set_ai as quality_set_ai
          import velvet_bot.handlers.quality_sets as quality_sets
          import velvet_bot.handlers.reference_comparison as reference_comparison
          import velvet_bot.media_set_actions as media_set_actions
          import velvet_bot.media_set_duplicate_actions as duplicate_actions
          import velvet_bot.media_set_duplicate_actions_repository as duplicate_repository
          import velvet_bot.quality_set_ai_repository as set_ai_repository
          import velvet_bot.quality_sets_repository as sets_repository
          import velvet_bot.reference_comparison_repository as comparison_repository

          ROOT = Path(__file__).resolve().parents[1]


          class Phase18CompletionTests(unittest.TestCase):
              def test_private_pool_baseline_is_empty(self) -> None:
                  baseline = json.loads(
                      (ROOT / "docs/private_pool_inventory.json").read_text(encoding="utf-8")
                  )
                  self.assertEqual(0, baseline["total_external_findings"])
                  self.assertEqual(0, baseline["total_files"])
                  self.assertEqual([], baseline["files"])

              def test_application_services_do_not_own_connections(self) -> None:
                  for module in (media_set_actions, duplicate_actions):
                      source = inspect.getsource(module)
                      self.assertNotIn("_require_pool", source)
                      self.assertNotIn("database.acquire()", source)

              def test_handlers_do_not_own_connections(self) -> None:
                  for module in (quality_set_ai, quality_sets, reference_comparison):
                      source = inspect.getsource(module)
                      self.assertNotIn("_require_pool", source)
                      self.assertNotIn("database.acquire()", source)

              def test_repository_boundaries_use_public_acquire(self) -> None:
                  expected = {
                      duplicate_repository: 1,
                      set_ai_repository: 4,
                      sets_repository: 2,
                      comparison_repository: 1,
                  }
                  for module, count in expected.items():
                      source = inspect.getsource(module)
                      self.assertNotIn("_require_pool", source)
                      self.assertEqual(count, source.count("database.acquire()") + source.count("self._database.acquire()"))

              def test_discussion_compat_delegates_to_canonical_query(self) -> None:
                  source = inspect.getsource(discussion_compat)
                  self.assertIn("get_discussion_dashboard(", source)
                  self.assertNotIn("SELECT", source)


          if __name__ == "__main__":
              unittest.main()
          ''',
          )
          PY
      - name: Commit generated refactor
        shell: bash
        run: |
          rm -f .github/workflows/phase18-completion.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Фаза 18: завершить private pool refactoring"
          git push origin HEAD:agent/phase18-completion
