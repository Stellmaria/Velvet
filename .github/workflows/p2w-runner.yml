name: p2w runner

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2w-public-manager-download-boundary'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2w-public-manager-download-boundary
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python scripts/_p2w_apply.py
      - run: python scripts/update_p2_stability_inventory.py --label p2w-public-manager-download-boundary --schema-version 25
      - run: python scripts/_p2w_docs.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 4189826+github-actions[bot]@users.noreply.github.com
          rm scripts/_p2w_apply.py scripts/_p2w_docs.py .github/workflows/p2w-runner.yml
          git add -A
          git commit -m "P2W manager download boundary"
          git push origin HEAD:agent/p2w-public-manager-download-boundary
