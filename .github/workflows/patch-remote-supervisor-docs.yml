name: patch remote supervisor docs

on:
  push:
    branches:
      - agent/remote-supervisor-console
    paths:
      - scripts/_patch_remote_supervisor_docs.py
      - .github/workflows/patch-remote-supervisor-docs.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/_patch_remote_supervisor_docs.py
      - .github/workflows/patch-remote-supervisor-docs.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remote-supervisor-console
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python scripts/_patch_remote_supervisor_docs.py
      - run: |
          git diff --check
          grep -q '^SUPERVISOR_TASK_NAME=VelvetSupervisor$' .env.example
          grep -q 'Безопасная консоль' docs/SUPERVISOR.md
          grep -q 'Windows bootstrap' CHANGELOG.md
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .env.example docs/SUPERVISOR.md CHANGELOG.md
          git commit -m "Документировать удалённое управление Supervisor"
          git push origin HEAD:agent/remote-supervisor-console
