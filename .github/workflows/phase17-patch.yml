name: phase17 remove runtime monkeypatches

on:
  push:
    branches:
      - agent/phase17-remove-runtime-monkeypatches

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase17-remove-runtime-monkeypatches
          fetch-depth: 0

      - name: Apply exact compatibility patch
        run: python scripts/_phase17_patch.py

      - name: Commit patched sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Фаза 17: удалить runtime monkeypatches"
          git push origin HEAD:agent/phase17-remove-runtime-monkeypatches
