name: Apply workspace template callback contract

on:
  push:
    branches:
      - agent/workspace-template-callback-contract
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-slice:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Apply workspace template callback contract'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-template-callback-contract
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Apply callback contract
        run: python .github/apply-workspace-template-callback-contract.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run focused validation
        run: |
          python -m compileall \
            velvet_bot/core/access/policy.py \
            velvet_bot/presentation/telegram/routers/core_operations_controllers/workspace_product_experience.py \
            tests/test_workspace_template_callback_contract.py \
            tests/test_workspace_commands_and_watermark_drafts.py
          python -m unittest -v \
            tests.test_workspace_template_callback_contract \
            tests.test_workspace_commands_and_watermark_drafts \
            tests.test_workspace_callback_recovery
      - name: Remove transformation script
        run: rm .github/apply-workspace-template-callback-contract.py
      - name: Commit applied slice
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Apply workspace template callback contract"
          git push origin HEAD:agent/workspace-template-callback-contract
