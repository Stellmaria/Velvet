name: patch supervisor log transport

on:
  push:
    branches:
      - agent/hotfix-supervisor-utf8-network-noise
    paths:
      - scripts/_patch_supervisor_log_transport.py
      - .github/workflows/patch-supervisor-log-transport.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/hotfix-supervisor-utf8-network-noise
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply patch
        run: python scripts/_patch_supervisor_log_transport.py

      - name: Validate syntax
        run: python -m compileall -q velvet_bot velvet_supervisor

      - name: Run focused tests
        run: |
          python -m pip install -r requirements.txt
          python -m unittest tests.test_supervisor_log_transport -v

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add velvet_supervisor/runtime.py velvet_bot/error_center.py
          git commit -m "Исправить UTF-8 логов и сетевой шум polling"
          git push origin HEAD:agent/hotfix-supervisor-utf8-network-noise
