name: p2v runner

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2v-public-archive-boundaries'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2v-public-archive-boundaries
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python scripts/_p2v_apply.py
      - run: python scripts/update_p2_stability_inventory.py --label p2v-public-archive-boundaries --schema-version 24
      - run: python scripts/_p2v_docs.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 4189826+github-actions[bot]@users.noreply.github.com
          rm scripts/_p2v_apply.py scripts/_p2v_docs.py .github/workflows/p2v-runner.yml
          git add -A
          git commit -m "P2V public archive boundaries"
          git push origin HEAD:agent/p2v-public-archive-boundaries
