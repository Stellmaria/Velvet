name: temp workspace grant inventory refresh

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Refresh repository inventory
        run: |
          python scripts/inventory_repository_layout.py --write --label p3e-repository-layout-complete
          rm -f .github/workflows/temp_workspace_grant_inventory_refresh.yml

      - name: Commit inventory
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refresh repository inventory for workspace grant SQL hotfix"
          git push origin HEAD:${{ github.head_ref }}
