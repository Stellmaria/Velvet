name: docker build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - ".env.example"
      - "requirements.txt"
      - "main.py"
      - "velvet_bot/**"
      - "scripts/container_healthcheck.py"
      - ".github/workflows/docker-build.yml"
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.yml"
      - ".env.example"
      - "requirements.txt"
      - "main.py"
      - "velvet_bot/**"
      - "scripts/container_healthcheck.py"
      - ".github/workflows/docker-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare compose environment
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Build Velvet image
        run: docker build --tag velvet-bot:ci .
