name: p2 stability audit runner

on:
  push:
    branches:
      - agent/p2-stability-inventory

permissions:
  contents: write

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2-stability-inventory
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build stability inventory
        run: |
          python - <<'PY'
          from __future__ import annotations

          import ast
          import json
          from collections import Counter
          from pathlib import Path

          root = Path('.')
          package = root / 'velvet_bot'

          def dotted(node: ast.AST) -> str:
              if isinstance(node, ast.Name):
                  return node.id
              if isinstance(node, ast.Attribute):
                  left = dotted(node.value)
                  return f'{left}.{node.attr}' if left else node.attr
              if isinstance(node, ast.Call):
                  return dotted(node.func)
              return ''

          def is_broad(handler: ast.ExceptHandler) -> bool:
              value = handler.type
              if isinstance(value, ast.Name):
                  return value.id == 'Exception'
              if isinstance(value, ast.Tuple):
                  return any(isinstance(item, ast.Name) and item.id == 'Exception' for item in value.elts)
              return False

          def callback_decorated(node: ast.AsyncFunctionDef) -> bool:
              return any('callback_query' in dotted(decorator) for decorator in node.decorator_list)

          def ack_await(node: ast.Await) -> bool:
              name = dotted(node.value)
              return (
                  name.endswith('callback.answer')
                  or name.endswith('_safe_callback_answer')
                  or name.endswith('safe_callback_answer')
              )

          broad: list[dict[str, object]] = []
          callbacks: list[dict[str, object]] = []

          for path in sorted(package.rglob('*.py')):
              relative = path.as_posix()
              try:
                  tree = ast.parse(path.read_text(encoding='utf-8'), filename=relative)
              except SyntaxError as error:
                  raise SystemExit(f'Cannot parse {relative}: {error}')

              parents: list[str] = []

              class Visitor(ast.NodeVisitor):
                  def visit_FunctionDef(self, node: ast.FunctionDef) -> None:
                      parents.append(node.name)
                      self.generic_visit(node)
                      parents.pop()

                  def visit_AsyncFunctionDef(self, node: ast.AsyncFunctionDef) -> None:
                      function_path = '.'.join([*parents, node.name])
                      if callback_decorated(node):
                          awaits = sorted(
                              (child for child in ast.walk(node) if isinstance(child, ast.Await)),
                              key=lambda item: (item.lineno, item.col_offset),
                          )
                          ack = next((item for item in awaits if ack_await(item)), None)
                          pre_ack = [item for item in awaits if ack is None or item.lineno < ack.lineno]
                          callbacks.append(
                              {
                                  'path': relative,
                                  'function': function_path,
                                  'line': node.lineno,
                                  'ack_line': ack.lineno if ack else None,
                                  'pre_ack_awaits': len(pre_ack),
                                  'total_awaits': len(awaits),
                                  'risk': (
                                      'missing_ack'
                                      if ack is None
                                      else ('late_ack' if pre_ack else 'early_ack')
                                  ),
                              }
                          )
                      parents.append(node.name)
                      self.generic_visit(node)
                      parents.pop()

                  def visit_ExceptHandler(self, node: ast.ExceptHandler) -> None:
                      if is_broad(node):
                          broad.append(
                              {
                                  'path': relative,
                                  'function': '.'.join(parents) or '<module>',
                                  'line': node.lineno,
                                  'handler_module': '/handlers/' in f'/{relative}',
                              }
                          )
                      self.generic_visit(node)

              Visitor().visit(tree)

          callbacks.sort(
              key=lambda item: (
                  {'missing_ack': 0, 'late_ack': 1, 'early_ack': 2}[str(item['risk'])],
                  -int(item['pre_ack_awaits']),
                  str(item['path']),
                  int(item['line']),
              )
          )
          broad.sort(key=lambda item: (str(item['path']), int(item['line'])))

          risky_callbacks = [item for item in callbacks if item['risk'] != 'early_ack']
          inventory = {
              'schema_version': 1,
              'generated_from_commit': 'p2a-stability-audit',
              'broad_exception_total': len(broad),
              'broad_exception_files': len({str(item['path']) for item in broad}),
              'callback_total': len(callbacks),
              'risky_callback_total': len(risky_callbacks),
              'risky_callback_files': len({str(item['path']) for item in risky_callbacks}),
              'next_slice': None,
              'broad_exceptions': broad,
              'callbacks': callbacks,
          }
          (root / 'docs/p2_stability_inventory.json').write_text(
              json.dumps(inventory, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          broad_by_file = Counter(str(item['path']) for item in broad)
          callback_by_file = Counter(str(item['path']) for item in risky_callbacks)
          lines = [
              '# P2 stability inventory',
              '',
              'AST-инвентаризация широких исключений и callback acknowledgment.',
              '',
              '## Сводка',
              '',
              f"- широких `except Exception`: **{len(broad)}** в **{len(broad_by_file)}** файлах;",
              f"- callback handlers: **{len(callbacks)}**;",
              f"- handlers с поздним или отсутствующим acknowledgment: **{len(risky_callbacks)}** в **{len(callback_by_file)}** файлах.",
              '',
              '## Наиболее рискованные callbacks',
              '',
          ]
          for item in risky_callbacks[:30]:
              lines.append(
                  f"- `{item['path']}:{item['line']}` `{item['function']}`: "
                  f"{item['risk']}, awaits до ack: {item['pre_ack_awaits']}."
              )
          if not risky_callbacks:
              lines.append('- Нет.')
          lines.extend(['', '## Широкие исключения по файлам', ''])
          for path, count in broad_by_file.most_common():
              lines.append(f'- `{path}`: {count}.')
          if not broad_by_file:
              lines.append('- Нет.')
          lines.extend(
              [
                  '',
                  '## Правило обновления',
                  '',
                  'Inventory проверяется AST-тестом. Любое изменение соответствующего кода обязано обновить этот файл.',
                  '',
              ]
          )
          (root / 'docs/p2_stability_inventory.md').write_text('\n'.join(lines), encoding='utf-8')

          status_path = root / 'docs/development_status.md'
          status = status_path.read_text(encoding='utf-8')
          status = status.replace(
              'Следующий срез: **18AN, repository boundary для `media_set_actions.py`**, 1 connection point. Ожидаемый baseline: 11 обращений в 6 файлах.\n',
              'Фаза 18 закрыта полностью; следующий архитектурный долг ведётся отдельной P2 stability inventory.\n',
          )
          old_plan = '''1. Фаза 18AN: вынести persistence из `media_set_actions.py` в repository boundary.\n2. Перенести остальные application/presentation DB access отдельными архитектурными срезами.\n3. Аудит долгих callback-сценариев.\n4. Сократить широкие `except Exception`.\n5. Создать staging-бота и staging-базу.\n6. Провести независимый backup/restore drill.\n7. Добавить encrypted offsite backup.\n8. Добавить AI duration/error/cost metrics.'''
          new_plan = '''1. P2A: измеримый аудит callback acknowledgment и широких `except Exception`.\n2. Исправлять risky callbacks отдельными поведенческими срезами.\n3. Сокращать широкие исключения по доменам без потери incident reporting.\n4. Создать staging-бота и staging-базу.\n5. Провести независимый backup/restore drill.\n6. Добавить encrypted offsite backup.\n7. Добавить AI duration/error/cost metrics.'''
          status = status.replace(old_plan, new_plan)
          status_path.write_text(status, encoding='utf-8')

          memory_path = root / 'docs/project_memory.md'
          memory = memory_path.read_text(encoding='utf-8')
          memory = memory.replace(
              'Следующий срез: **18AN, repository boundary для `media_set_actions.py`**, 1 connection point. Ожидаемый baseline: 11 обращений в 6 файлах.\n',
              'Фаза 18 закрыта полностью; следующий измеримый долг хранится в `docs/p2_stability_inventory.*`.\n',
          )
          old_memory = '''1. Фаза 18AN: media-set actions repository boundary, baseline 12 → 11.\n2. Перенести оставшийся application и presentation DB access в repository/use case boundaries.\n3. Проверить все долгие callback-сценарии и ранний acknowledgment.\n4. Сократить широкие `except Exception` в бизнес-логике.\n5. Подготовить staging-бота и staging-базу.\n6. Провести независимый backup/restore drill.\n7. Добавить зашифрованную внешнюю репликацию backup.\n8. Добавить метрики длительности и ошибок AI-задач.'''
          new_memory = '''1. P2A: поддерживать AST-инвентаризацию callback acknowledgment и широких исключений.\n2. Исправлять risky callbacks отдельными поведенческими срезами.\n3. Сокращать широкие `except Exception` в бизнес-логике без потери диагностики.\n4. Подготовить staging-бота и staging-базу.\n5. Провести независимый backup/restore drill.\n6. Добавить зашифрованную внешнюю репликацию backup.\n7. Добавить метрики длительности и ошибок AI-задач.'''
          memory = memory.replace(old_memory, new_memory)
          memory_path.write_text(memory, encoding='utf-8')

          changelog_path = root / 'CHANGELOG.md'
          changelog = changelog_path.read_text(encoding='utf-8')
          marker = '## [Unreleased]\n'
          entry = (
              '\n### P2A: stability inventory\n\n'
              '- Добавлена AST-инвентаризация callback acknowledgment и широких исключений.\n'
              '- Удалены устаревшие ссылки на незавершённую Фазу 18AN из текущего плана.\n'
          )
          if entry.strip() not in changelog:
              changelog = changelog.replace(marker, marker + entry, 1)
          changelog_path.write_text(changelog, encoding='utf-8')

          test = '''from __future__ import annotations

import ast
import json
import unittest
from pathlib import Path

ROOT = Path(__file__).resolve().parents[1]
PACKAGE = ROOT / "velvet_bot"


def _dotted(node: ast.AST) -> str:
    if isinstance(node, ast.Name):
        return node.id
    if isinstance(node, ast.Attribute):
        left = _dotted(node.value)
        return f"{left}.{node.attr}" if left else node.attr
    if isinstance(node, ast.Call):
        return _dotted(node.func)
    return ""


def _broad(handler: ast.ExceptHandler) -> bool:
    value = handler.type
    if isinstance(value, ast.Name):
        return value.id == "Exception"
    if isinstance(value, ast.Tuple):
        return any(isinstance(item, ast.Name) and item.id == "Exception" for item in value.elts)
    return False


def _callback(node: ast.AsyncFunctionDef) -> bool:
    return any("callback_query" in _dotted(decorator) for decorator in node.decorator_list)


def _ack(node: ast.Await) -> bool:
    name = _dotted(node.value)
    return name.endswith("callback.answer") or name.endswith("_safe_callback_answer") or name.endswith("safe_callback_answer")


def _actual() -> tuple[int, int, int, int, int]:
    broad: list[tuple[str, int]] = []
    callbacks: list[tuple[str, int, str]] = []
    for path in sorted(PACKAGE.rglob("*.py")):
        tree = ast.parse(path.read_text(encoding="utf-8"))
        for node in ast.walk(tree):
            if isinstance(node, ast.ExceptHandler) and _broad(node):
                broad.append((path.as_posix(), node.lineno))
            if isinstance(node, ast.AsyncFunctionDef) and _callback(node):
                awaits = sorted(
                    (item for item in ast.walk(node) if isinstance(item, ast.Await)),
                    key=lambda item: (item.lineno, item.col_offset),
                )
                ack = next((item for item in awaits if _ack(item)), None)
                pre = [item for item in awaits if ack is None or item.lineno < ack.lineno]
                callbacks.append((path.as_posix(), node.lineno, "missing_ack" if ack is None else ("late_ack" if pre else "early_ack")))
    risky = [item for item in callbacks if item[2] != "early_ack"]
    return len(broad), len({path for path, _ in broad}), len(callbacks), len(risky), len({path for path, _, _ in risky})


class P2StabilityInventoryTests(unittest.TestCase):
    def test_inventory_matches_current_ast(self) -> None:
        data = json.loads((ROOT / "docs/p2_stability_inventory.json").read_text(encoding="utf-8"))
        self.assertEqual(
            _actual(),
            (
                data["broad_exception_total"],
                data["broad_exception_files"],
                data["callback_total"],
                data["risky_callback_total"],
                data["risky_callback_files"],
            ),
        )

    def test_phase18_plan_is_not_stale(self) -> None:
        for name in ("development_status.md", "project_memory.md"):
            text = (ROOT / "docs" / name).read_text(encoding="utf-8")
            self.assertNotIn("Следующий срез: **18AN", text)
            self.assertNotIn("Фаза 18AN:", text)


if __name__ == "__main__":
    unittest.main()
'''
          (root / 'tests/test_p2_stability_inventory.py').write_text(test, encoding='utf-8')

          worklog = '''# Сессия: P2A — stability inventory

- Дата: 2026-07-18
- ID: `2026-07-18-p2a-stability-inventory`
- Линия/фаза: основное развитие Velvet Archive, P2A
- Статус: частично
- Ветка: `agent/p2-stability-inventory`
