name: temp network failure fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-codex-403-asyncpg-network-noise
          fetch-depth: 1
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Capture failure
        shell: bash
        run: |
          rm -f tools/temp_patch_error.txt
          set +e
          python tools/temp_apply_network_failure_fixes_v2.py > /tmp/patch.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            git reset --hard HEAD
            cp /tmp/patch.log tools/temp_patch_error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tools/temp_patch_error.txt
            git commit -m "Record current robust patch failure"
            git push origin HEAD:agent/fix-codex-403-asyncpg-network-noise
          fi
