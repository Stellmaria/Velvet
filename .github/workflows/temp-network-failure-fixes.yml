name: temp network failure fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-codex-403-asyncpg-network-noise
          fetch-depth: 1
          show-progress: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply fixes
        run: |
          rm -f tools/temp_patch_error.txt
          python - <<'PY'
          from pathlib import Path
          path = Path("tools/temp_apply_network_failure_fixes.py")
          source = path.read_text(encoding="utf-8")
          source = source.replace(
              '"           OR (\\n               logger_name = \'velvet_bot.presentation.telegram.router\'',
              '"          OR (\\n               logger_name = \'velvet_bot.presentation.telegram.router\'',
          )
          path.write_text(source, encoding="utf-8")
          PY
          python tools/temp_apply_network_failure_fixes.py

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run focused tests
        run: |
          python -m unittest tests.test_network_failure_handling tests.test_runtime_stability_hotfix tests.test_supervisor_dependency_sync tests.test_supervisor_codex_command -v
          python -m compileall -q velvet_bot velvet_supervisor tests/test_network_failure_handling.py
          git diff --check

      - name: Refresh stability inventory
        run: python scripts/update_p2_stability_inventory.py --label network-failure-fixes --schema-version 57

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Handle Codex 403 and transient network failures"
          git push origin HEAD:agent/fix-codex-403-asyncpg-network-noise
