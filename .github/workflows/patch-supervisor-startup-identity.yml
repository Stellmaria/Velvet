name: patch supervisor startup identity

on:
  push:
    branches:
      - agent/supervisor-startup-fingerprint
    paths:
      - scripts/_patch_supervisor_startup_identity.py
      - .github/workflows/patch-supervisor-startup-identity.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/_patch_supervisor_startup_identity.py
      - .github/workflows/patch-supervisor-startup-identity.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/supervisor-startup-fingerprint
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply patch
        run: python scripts/_patch_supervisor_startup_identity.py

      - name: Validate syntax
        run: python -m compileall -q velvet_supervisor

      - name: Commit runtime
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add velvet_supervisor/runtime.py
          git commit -m "Показывать commit и UTF-8 при запуске Supervisor"
          git push origin HEAD:agent/supervisor-startup-fingerprint
