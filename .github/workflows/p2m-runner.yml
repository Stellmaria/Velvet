name: p2m runner

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2m-error-center-boundaries'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2m-error-center-boundaries
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: base64 -d .github/data/p2m_apply.b64 > .github/p2m_apply.py
      - run: base64 -d .github/data/p2m_test.b64 > tests/test_p2m_error_center_boundaries.py
      - run: python .github/p2m_apply.py
      - run: python scripts/update_p2_stability_inventory.py --label p2m-error-center-boundaries --schema-version 15
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/p2m_apply.py .github/data/p2m_apply.b64 .github/data/p2m_test.b64 .github/workflows/p2m-runner.yml
          git add -A
          git commit -m "P2M update"
          git push origin HEAD:agent/p2m-error-center-boundaries
