name: p2 final inventory artifact

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Generate final P2 inventory
        run: python scripts/update_p2_stability_inventory.py --label p2ap-final-stability --schema-version 43
      - name: Upload generated inventory
        uses: actions/upload-artifact@v4
        with:
          name: p2-final-inventory
          path: |
            docs/p2_stability_inventory.json
            docs/p2_stability_inventory.md
