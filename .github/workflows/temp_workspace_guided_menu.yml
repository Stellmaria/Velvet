name: temp workspace guided menu

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-guided-menu-navigation
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply guided menu patch
        run: python tools/temp_apply_workspace_guided_menu.py

      - name: Validate syntax
        run: |
          python -m compileall -q velvet_bot tests/test_workspace_guided_menu.py
          git diff --check

      - name: Commit feature
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add guided personal workspace menu and navigation"
          git push origin HEAD:agent/workspace-guided-menu-navigation
