name: temporary workspace publication inventory regeneration

on:
  push:
    branches:
      - agent/workspace-publication-queues
    paths:
      - .github/workflows/tmp-regenerate-workspace-publication-inventories.yml

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-publication-queues
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Regenerate canonical inventories
        run: |
          python scripts/inventory_architecture_layout.py --write --label p3d-analytics-alias-retirement
          python scripts/inventory_repository_layout.py --write --label p3e-repository-layout-complete
          python scripts/telegram_navigation_inventory.py --root velvet_bot --markdown docs/generated/telegram_navigation_inventory.md
          python scripts/update_p2_stability_inventory.py --label workspace-publication-queues --schema-version 50
      - name: Commit generated files and remove temporary workflow
        run: |
          rm .github/workflows/tmp-regenerate-workspace-publication-inventories.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Regenerate workspace publication inventories"
          git push origin HEAD:agent/workspace-publication-queues
