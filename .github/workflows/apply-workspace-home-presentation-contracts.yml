name: Apply workspace home presentation contracts

on:
  push:
    branches:
      - agent/workspace-home-presentation-contracts
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-slice:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Apply workspace home presentation contracts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-home-presentation-contracts
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Repair checked transformation
        run: python .github/fix-workspace-home-transform.py
      - name: Apply home presentation contracts
        run: python .github/apply-workspace-home-presentation-contracts.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run focused validation
        run: |
          python -m compileall \
            velvet_bot/presentation/telegram/workspace_command_menu.py \
            velvet_bot/presentation/telegram/routers/workspace_owner_controls.py \
            velvet_bot/presentation/telegram/routers/core_operations_controllers/workspace_product_experience.py \
            velvet_bot/presentation/telegram/routers/core_operations_controllers/owner_menu.py \
            tests/test_workspace_home_presentation_contracts.py
          python -m unittest -v \
            tests.test_workspace_home_presentation_contracts \
            tests.test_workspace_commands_and_watermark_drafts \
            tests.test_workspace_quick_references_contract \
            tests.test_workspace_hint_preference_boundary
          python scripts/telegram_navigation_inventory.py --root velvet_bot --check
      - name: Remove transformation scripts
        run: |
          rm .github/apply-workspace-home-presentation-contracts.py
          rm .github/fix-workspace-home-transform.py
      - name: Commit applied slice
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Apply workspace home presentation contracts"
          git push origin HEAD:agent/workspace-home-presentation-contracts
