name: patch ai job tracking

on:
  push:
    branches:
      - agent/fix-ai-quality-operations-menu
    paths:
      - scripts/_patch_ai_job_tracking.py
      - .github/workflows/patch-ai-job-tracking.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/_patch_ai_job_tracking.py
      - .github/workflows/patch-ai-job-tracking.yml

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-ai-quality-operations-menu
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply patch
        run: |
          set -o pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/_patch_ai_job_tracking.py")
          source = path.read_text(encoding="utf-8")
          old = '''def replace_span(source: str, start: str, end: str, replacement: str, *, label: str) -> str:
              if source.count(start) != 1:
                  raise RuntimeError(f"{label}: неоднозначная начальная граница")
              start_index = source.index(start)
              end_index = source.find(end, start_index + len(start))
              if end_index < 0:
                  raise RuntimeError(f"{label}: не найдена конечная граница")
              return source[:start_index] + replacement + source[end_index:]
          '''.replace("          ", "")
          new = '''def replace_span(source: str, start: str, end: str, replacement: str, *, label: str) -> str:
              end_index = source.find(end)
              if end_index < 0:
                  raise RuntimeError(f"{label}: не найдена конечная граница")
              start_index = source.rfind(start, 0, end_index)
              if start_index < 0:
                  raise RuntimeError(f"{label}: не найдена начальная граница")
              return source[:start_index] + replacement + source[end_index:]
          '''.replace("          ", "")
          if old not in source:
              raise SystemExit("replace_span source block not found")
          path.write_text(source.replace(old, new, 1), encoding="utf-8")
          PY
          python scripts/_patch_ai_job_tracking.py 2>&1 | tee patch-ai-job-tracking.log

      - name: Validate syntax
        run: python -m compileall -q velvet_bot

      - name: Upload patched handlers
        uses: actions/upload-artifact@v4
        with:
          name: patched-ai-handlers
          path: |
            velvet_bot/handlers/velvet_ai.py
            velvet_bot/handlers/velvet_ai_visual.py
            velvet_bot/handlers/velvet_ai_formatting.py

      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-ai-job-tracking-log
          path: patch-ai-job-tracking.log
