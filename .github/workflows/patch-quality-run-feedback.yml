name: patch quality run feedback

on:
  push:
    branches:
      - agent/fix-ai-quality-operations-menu
    paths:
      - scripts/_patch_quality_run_feedback.py
      - .github/workflows/patch-quality-run-feedback.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/_patch_quality_run_feedback.py
      - .github/workflows/patch-quality-run-feedback.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-ai-quality-operations-menu
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply patch
        run: |
          set -o pipefail
          python scripts/_patch_quality_run_feedback.py 2>&1 | tee patch-quality-run.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patch-quality-run-log
          path: patch-quality-run.log

      - name: Validate syntax
        run: python -m compileall -q velvet_bot

      - name: Commit handler
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add velvet_bot/handlers/quality_operations.py
          git commit -m "Отвечать сразу при запуске проверки качества"
          git push origin HEAD:agent/fix-ai-quality-operations-menu
