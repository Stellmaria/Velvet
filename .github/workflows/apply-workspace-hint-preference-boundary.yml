name: Apply workspace hint preference boundary

on:
  push:
    branches:
      - agent/workspace-hint-preference-boundary
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-slice:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Apply workspace hint preference boundary'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-hint-preference-boundary
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Apply checked transformations
        run: |
          python .github/apply-workspace-hint-domain.py
          python .github/apply-workspace-hint-controller.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run focused validation
        run: |
          python -m compileall \
            velvet_bot/domains/workspaces/product_repository.py \
            velvet_bot/domains/workspaces/product_service.py \
            velvet_bot/presentation/telegram/routers/core_operations_controllers/workspace_product_experience.py \
            tests/test_workspace_hint_preference_boundary.py
          python -m unittest tests.test_workspace_hint_preference_boundary tests.test_workspace_commands_and_watermark_drafts
      - name: Remove transformation scripts
        run: |
          rm .github/apply-workspace-hint-domain.py
          rm .github/apply-workspace-hint-controller.py
      - name: Commit applied slice
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Apply workspace hint preference boundary"
          git push origin HEAD:agent/workspace-hint-preference-boundary
