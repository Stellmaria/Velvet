name: agent fast watermark autofix

on:
  push:
    branches:
      - agent/public-archive-fast-watermark

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[autofix]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/public-archive-fast-watermark
          fetch-depth: 0
      - name: Apply focused source patch
        run: |
          python - <<'PY'
          from pathlib import Path

          controller = Path("velvet_bot/presentation/telegram/routers/core_operations_controllers/watermark.py")
          text = controller.read_text(encoding="utf-8")
          wrapper = '''@router.callback_query(PublicArchiveCallback.filter(F.action == "pwm"))
          async def handle_public_archive_watermark(
              callback: CallbackQuery,
              callback_data: PublicArchiveCallback,
              database: Database,
              bot: Bot,
              access_policy,
          ) -> None:
              await handle_manager_fast_watermark(
                  callback,
                  callback_data,
                  database,
                  bot,
                  access_policy,
              )


          '''
          if wrapper not in text:
              raise SystemExit("archive watermark wrapper block not found")
          text = text.replace(wrapper, "", 1)
          registration = '''router.callback_query.register(
              handle_manager_fast_watermark,
              PublicArchiveCallback.filter(F.action == "pwm"),
          )


          '''
          marker = '__all__ = ("router",)'
          if marker not in text:
              raise SystemExit("watermark __all__ marker not found")
          text = text.replace(marker, registration + marker, 1)
          controller.write_text(text, encoding="utf-8")

          integration = Path("tests/test_watermark_repository_integration.py")
          test_text = integration.read_text(encoding="utf-8")
          expected = 'self.assertEqual((3, "bottom_right", "#ffffff"), revision)'
          replacement = 'self.assertEqual((3, "bottom_right", "auto"), revision)'
          if expected not in test_text:
              raise SystemExit("old watermark default expectation not found")
          integration.write_text(
              test_text.replace(expected, replacement, 1),
              encoding="utf-8",
          )
          PY
      - name: Commit focused patch
        run: |
          git config user.name "Velvet CI"
          git config user.email "actions@users.noreply.github.com"
          git add velvet_bot/presentation/telegram/routers/core_operations_controllers/watermark.py tests/test_watermark_repository_integration.py
          git commit -m "[autofix] register archive watermark action directly"
          git push origin HEAD:agent/public-archive-fast-watermark
