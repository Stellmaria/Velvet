name: p3c windows smoke

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  architecture-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile moved modules
        run: |
          python -m compileall -q velvet_bot/presentation/telegram/routers/supervisor velvet_bot/presentation/telegram/routers/system.py velvet_bot/handlers/supervisor_control.py velvet_bot/handlers/system_center.py

      - name: Run P3C architecture smoke tests
        run: |
          python -m unittest -v `
            tests.test_p3c_supervisor_system_presentation `
            tests.test_phase10_supervisor_access `
            tests.test_p3_architecture_organization `
            tests.test_architecture_layout_inventory `
            tests.test_project_integrity `
            tests.test_supervisor_logs_callback `
            tests.test_fresh_runtime_log_hotfix `
            tests.test_p2ae_supervisor_console_watcher
