name: patch remote supervisor runtime

on:
  push:
    branches:
      - agent/remote-supervisor-console
    paths:
      - scripts/_patch_remote_supervisor_runtime.py
      - .github/workflows/patch-remote-supervisor-runtime.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/_patch_remote_supervisor_runtime.py
      - .github/workflows/patch-remote-supervisor-runtime.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/remote-supervisor-console
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply runtime patch
        run: python scripts/_patch_remote_supervisor_runtime.py

      - name: Validate syntax
        run: python -m compileall -q velvet_bot velvet_supervisor

      - name: Commit runtime integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add velvet_supervisor/runtime.py velvet_bot/presentation/telegram/supervisor/views.py
          git commit -m "Подключить удалённую консоль к runtime Supervisor"
          git push origin HEAD:agent/remote-supervisor-console
