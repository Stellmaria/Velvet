name: temporary owner diagnostic contracts

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/owner-diagnostic-zip-bundles
          fetch-depth: 0

      - name: Update diagnostic contracts
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('velvet_bot/app/bootstrap.py'): (
                  '    diagnostic_service: DiagnosticBundleService | None,\n',
                  '    diagnostic_service: DiagnosticBundleService | None = None,\n',
              ),
              Path('velvet_bot/app/commands.py'): (
                  '        BotCommand(command="diag", description="Состояние и диагностический ZIP"),\n',
                  '',
              ),
          }
          for path, (old, new) in replacements.items():
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'marker not found in {path}: {old!r}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          integrity = Path('tests/test_project_integrity.py')
          text = integrity.read_text(encoding='utf-8')
          old = '    "version",\n    "analytics",\n'
          new = '    "version",\n    "diag",\n    "diagnostics",\n    "analytics",\n'
          if old not in text:
              raise SystemExit('panel command marker not found')
          text = text.replace(old, new, 1)
          old = '    "test_error_alert",\n}\n'
          new = '    "test_error_alert",\n    "diag_export",\n}\n'
          if old not in text:
              raise SystemExit('direct command marker not found')
          integrity.write_text(text.replace(old, new, 1), encoding='utf-8')

          organization = Path('tests/test_p3_architecture_organization.py')
          text = organization.read_text(encoding='utf-8')
          old = '    "velvet_bot.presentation.telegram.routers.core_operations_controllers.error_center",\n'
          new = (
              '    "velvet_bot.presentation.telegram.routers.core_operations_controllers.diagnostics",\n'
              '    "velvet_bot.presentation.telegram.routers.core_operations_controllers.error_center",\n'
          )
          if old not in text:
              raise SystemExit('router contract marker not found')
          organization.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Regenerate inventories
        run: |
          python scripts/update_p2_stability_inventory.py --label owner-diagnostic-zip-bundles --schema-version 45
          python scripts/inventory_architecture_layout.py --write --label p3d-analytics-alias-retirement
          python scripts/inventory_repository_layout.py --write --label p3e-repository-layout-complete

      - name: Commit contract updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update diagnostic architecture contracts"
          git push origin HEAD:agent/owner-diagnostic-zip-bundles
