name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate-and-release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: velvet_test
          POSTGRES_USER: velvet
          POSTGRES_PASSWORD: velvet_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U velvet -d velvet_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://velvet:velvet_test_password@localhost:5432/velvet_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify tag matches application version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          app_version="$(python -c 'from velvet_bot.version import APP_VERSION; print(APP_VERSION)')"
          if [ "$tag_version" != "$app_version" ]; then
            echo "Tag version $tag_version does not match APP_VERSION $app_version"
            exit 1
          fi

      - name: Run complete test suite
        run: python -m unittest discover -s tests -v

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            --title "Velvet $GITHUB_REF_NAME"
