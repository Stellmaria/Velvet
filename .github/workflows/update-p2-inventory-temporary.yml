name: temporary p2 inventory update

on:
  push:
    branches:
      - agent/workspace-character-inline-pickers

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/workspace-character-inline-pickers
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Regenerate P2 inventory
        run: >-
          python scripts/update_p2_stability_inventory.py
          --label workspace-character-inline-pickers
          --schema-version 48

      - name: Commit generated inventory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/p2_stability_inventory.json docs/p2_stability_inventory.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update P2 stability inventory"
          git push origin HEAD:agent/workspace-character-inline-pickers
