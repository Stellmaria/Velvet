name: phase15 multi story domain patch

on:
  push:
    branches:
      - agent/phase15-multi-story-domain

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase15-multi-story-domain
          fetch-depth: 0

      - name: Apply exact multi-story patch
        run: python scripts/_phase15_patch.py

      - name: Commit patched sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Фаза 15: перенести multi-story в домен"
          git push origin HEAD:agent/phase15-multi-story-domain
