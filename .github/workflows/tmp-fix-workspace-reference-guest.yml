name: temporary workspace reference guest fix

on:
  push:
    branches:
      - agent/workspace-reference-library
    paths:
      - .github/workflows/tmp-fix-workspace-reference-guest.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-reference-library
          fetch-depth: 0
      - name: Fix guest-query response
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("velvet_bot/presentation/telegram/routers/workspace_reference_library.py")
          source = path.read_text(encoding="utf-8")
          source = source.replace(
              "import asyncio\nimport logging\n",
              "import asyncio\nimport hashlib\nimport logging\n",
              1,
          )
          source = source.replace(
              "    InlineQueryResultCachedPhoto,\n    InputMediaPhoto,\n    Message,\n",
              "    InlineQueryResultArticle,\n    InlineQueryResultCachedPhoto,\n    InputMediaPhoto,\n    InputTextMessageContent,\n    Message,\n",
              1,
          )
          old = '''    if message.guest_query_id:
                  await message.answer_guest_query([], cache_time=1, is_personal=True)
          '''
          new = '''    if not message.guest_query_id:
                  return
              result_id = hashlib.sha256(
                  f"workspace-reference-private:{message.guest_query_id}".encode("utf-8")
              ).hexdigest()[:32]
              await message.answer_guest_query(
                  InlineQueryResultArticle(
                      id=result_id,
                      title="Личная библиотека референсов",
                      input_message_content=InputTextMessageContent(
                          message_text=(
                              "Личные референсы доступны только владельцу и участникам "
                              "выбранного пространства в чате с ботом."
                          ),
                          parse_mode=ParseMode.HTML,
                      ),
                  )
              )
          '''
          if old not in source:
              raise SystemExit("guest response block not found")
          path.write_text(source.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Commit fix and remove workflow
        run: |
          rm .github/workflows/tmp-fix-workspace-reference-guest.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Return a valid guest reference result"
          git push origin HEAD:agent/workspace-reference-library
