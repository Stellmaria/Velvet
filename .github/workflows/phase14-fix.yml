name: phase14 analytics split fix

on:
  push:
    branches:
      - agent/phase14-analytics-management-split

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase14-analytics-management-split
          fetch-depth: 0

      - name: Apply syntax and compatibility fix
        run: python scripts/_phase14_fix.py

      - name: Commit fixed sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Исправить синтаксис разделённых analytics handlers"
          git push origin HEAD:agent/phase14-analytics-management-split
