name: p2d media quality boundary runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-slice:
    if: github.head_ref == 'agent/p2d-media-quality-boundary'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2d-media-quality-boundary
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply media quality boundary slice
        run: python scripts/_p2d_media_quality_boundary.py

      - name: Commit media quality boundary slice
        run: |
          rm -f .github/workflows/p2d-media-quality-boundary-runner.yml
          rm -f scripts/_p2d_media_quality_boundary.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P2D: классифицировать media quality boundary"
          git push origin HEAD:agent/p2d-media-quality-boundary
