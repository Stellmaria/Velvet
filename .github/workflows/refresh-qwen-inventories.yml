name: refresh qwen inventories

on:
  push:
    branches:
      - agent/workspace-rework-isolation
    paths:
      - .github/workflows/refresh-qwen-inventories.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/workspace-rework-isolation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Regenerate inventories
        run: |
          python scripts/update_p2_stability_inventory.py \
            --label workspace-qwen-product \
            --schema-version 62
          python scripts/inventory_repository_layout.py \
            --write \
            --label p3e-repository-layout-complete
          python scripts/telegram_navigation_inventory.py \
            --root velvet_bot \
            --markdown docs/generated/telegram_navigation_inventory.md

      - name: Remove one-shot workflow and commit generated files
        run: |
          rm .github/workflows/refresh-qwen-inventories.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/p2_stability_inventory.json \
                  docs/p2_stability_inventory.md \
                  docs/repository_layout_inventory.json \
                  docs/repository_layout_inventory.md \
                  docs/generated/telegram_navigation_inventory.md \
                  .github/workflows/refresh-qwen-inventories.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Refresh inventories for personal Qwen"
          git push origin HEAD:agent/workspace-rework-isolation
