name: temp workspace owner refresh

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Patch callbacks, contracts and generated inventories
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          owner = Path("velvet_bot/presentation/telegram/routers/workspace_owner_controls.py")
          source = owner.read_text(encoding="utf-8")

          old_home = '''@router.callback_query(WorkspaceCallback.filter(F.action == "home"))
          async def handle_workspace_owner_home(
              callback: CallbackQuery,
              callback_data: WorkspaceCallback,
              workspace_service: WorkspaceService,
              workspace_product_service: WorkspaceProductService,
          ) -> None:
              try:
                  workspace = await _resolve_workspace(
                      workspace_service=workspace_service,
                      user_id=callback.from_user.id,
                      workspace_id=callback_data.workspace_id,
                      minimum_role="owner",
                  )
                  await _render_home(
                      callback,
                      workspace=workspace,
                      user_id=callback.from_user.id,
                      workspace_service=workspace_service,
                      workspace_product_service=workspace_product_service,
                  )
              except WorkspaceAccessError as error:
                  await callback.answer(str(error), show_alert=True)
          '''
          new_home = '''async def _handle_workspace_owner_home(
              callback: CallbackQuery,
              *,
              callback_data: WorkspaceCallback,
              workspace_service: WorkspaceService,
              workspace_product_service: WorkspaceProductService,
          ) -> None:
              try:
                  workspace = await _resolve_workspace(
                      workspace_service=workspace_service,
                      user_id=callback.from_user.id,
                      workspace_id=callback_data.workspace_id,
                      minimum_role="owner",
                  )
                  await _render_home(
                      callback,
                      workspace=workspace,
                      user_id=callback.from_user.id,
                      workspace_service=workspace_service,
                      workspace_product_service=workspace_product_service,
                  )
              except WorkspaceAccessError as error:
                  await callback.answer(str(error), show_alert=True)


          @router.callback_query(WorkspaceCallback.filter(F.action == "home"))
          async def handle_workspace_owner_home(
              callback: CallbackQuery,
              callback_data: WorkspaceCallback,
              workspace_service: WorkspaceService,
              workspace_product_service: WorkspaceProductService,
          ) -> None:
              await _handle_workspace_owner_home(
                  callback,
                  callback_data=callback_data,
                  workspace_service=workspace_service,
                  workspace_product_service=workspace_product_service,
              )
          '''
          if old_home not in source:
              raise SystemExit("owner home block not found")
          source = source.replace(old_home, new_home, 1)

          old_cancel = '''@router.callback_query(WorkspaceCallback.filter(F.action == "deletecancel"))
          async def handle_workspace_delete_cancel(
              callback: CallbackQuery,
              callback_data: WorkspaceCallback,
              workspace_service: WorkspaceService,
              workspace_product_service: WorkspaceProductService,
          ) -> None:
              try:
                  workspace = await _resolve_workspace(
                      workspace_service=workspace_service,
                      user_id=callback.from_user.id,
                      workspace_id=callback_data.workspace_id,
                      minimum_role="owner",
                  )
                  await _render_home(
                      callback,
                      workspace=workspace,
                      user_id=callback.from_user.id,
                      workspace_service=workspace_service,
                      workspace_product_service=workspace_product_service,
                  )
              except WorkspaceAccessError as error:
                  await callback.answer(str(error), show_alert=True)
          '''
          new_cancel = '''async def _handle_workspace_delete_cancel(
              callback: CallbackQuery,
              *,
              callback_data: WorkspaceCallback,
              workspace_service: WorkspaceService,
              workspace_product_service: WorkspaceProductService,
          ) -> None:
              try:
                  workspace = await _resolve_workspace(
                      workspace_service=workspace_service,
                      user_id=callback.from_user.id,
                      workspace_id=callback_data.workspace_id,
                      minimum_role="owner",
                  )
                  await _render_home(
                      callback,
                      workspace=workspace,
                      user_id=callback.from_user.id,
                      workspace_service=workspace_service,
                      workspace_product_service=workspace_product_service,
                  )
              except WorkspaceAccessError as error:
                  await callback.answer(str(error), show_alert=True)


          @router.callback_query(WorkspaceCallback.filter(F.action == "deletecancel"))
          async def handle_workspace_delete_cancel(
              callback: CallbackQuery,
              callback_data: WorkspaceCallback,
              workspace_service: WorkspaceService,
              workspace_product_service: WorkspaceProductService,
          ) -> None:
              await _handle_workspace_delete_cancel(
                  callback,
                  callback_data=callback_data,
                  workspace_service=workspace_service,
                  workspace_product_service=workspace_product_service,
              )
          '''
          if old_cancel not in source:
              raise SystemExit("delete cancel block not found")
          owner.write_text(source.replace(old_cancel, new_cancel, 1), encoding="utf-8")

          help_path = Path(
              "velvet_bot/presentation/telegram/routers/"
              "core_operations_controllers/owner_help.py"
          )
          help_source = help_path.read_text(encoding="utf-8")
          needle = '''            ("workspace_unbind", "удалить назначение чата или темы"),
          '''
          replacement = needle + '''            ("workspace_delete", "удалить личное пространство с подтверждением"),
          '''
          if needle not in help_source:
              raise SystemExit("owner help insertion point not found")
          help_path.write_text(help_source.replace(needle, replacement, 1), encoding="utf-8")

          p3 = Path("tests/test_p3_architecture_organization.py")
          p3_source = p3.read_text(encoding="utf-8")
          needle = '''    "velvet_bot.presentation.telegram.routers.workspace_onboarding_channel_bind",
          '''
          replacement = needle + '''    "velvet_bot.presentation.telegram.routers.workspace_owner_controls",
          '''
          if needle not in p3_source:
              raise SystemExit("p3 router insertion point not found")
          p3.write_text(p3_source.replace(needle, replacement, 1), encoding="utf-8")

          p3c = Path("tests/test_p3c_publication_controllers.py")
          p3c_source = p3c.read_text(encoding="utf-8")
          if "self.assertEqual(45, source.count" not in p3c_source:
              raise SystemExit("p3c router count not found")
          p3c.write_text(
              p3c_source.replace(
                  "self.assertEqual(45, source.count",
                  "self.assertEqual(46, source.count",
                  1,
              ),
              encoding="utf-8",
          )
          PY

          python -m py_compile \
            velvet_bot/presentation/telegram/routers/workspace_owner_controls.py \
            velvet_bot/presentation/telegram/routers/core_operations_controllers/owner_help.py
          python scripts/inventory_architecture_layout.py \
            --write --label p3d-analytics-alias-retirement
          python scripts/update_p2_stability_inventory.py \
            --label workspace-owner-access-fix --schema-version 53
          python scripts/telegram_navigation_inventory.py \
            --root velvet_bot \
            --markdown docs/generated/telegram_navigation_inventory.md

      - name: Commit refreshed files and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/temp-workspace-owner-refresh.yml
          git add \
            velvet_bot/presentation/telegram/routers/workspace_owner_controls.py \
            velvet_bot/presentation/telegram/routers/core_operations_controllers/owner_help.py \
            tests/test_p3_architecture_organization.py \
            tests/test_p3c_publication_controllers.py \
            docs/architecture_layout_inventory.json \
            docs/architecture_layout_inventory.md \
            docs/p2_stability_inventory.json \
            docs/p2_stability_inventory.md \
            docs/generated/telegram_navigation_inventory.md
          git commit -m "Refresh workspace owner contracts and inventories"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
