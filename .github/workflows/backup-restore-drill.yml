name: backup restore drill

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 0"
  pull_request:
    paths:
      - "migrations/**"
      - "velvet_bot/database.py"
      - "velvet_bot/backup_restore_drill.py"
      - "scripts/backup_restore_drill.py"
      - "tests/test_backup_restore_drill.py"
      - ".github/workflows/backup-restore-drill.yml"
  push:
    branches:
      - main
    paths:
      - "migrations/**"
      - "velvet_bot/database.py"
      - "velvet_bot/backup_restore_drill.py"
      - "scripts/backup_restore_drill.py"
      - "tests/test_backup_restore_drill.py"
      - ".github/workflows/backup-restore-drill.yml"

jobs:
  restore-drill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: velvet_restore_source
          POSTGRES_USER: velvet
          POSTGRES_PASSWORD: velvet_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U velvet -d velvet_restore_source"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://velvet:velvet_test_password@localhost:5432/velvet_restore_source
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies and PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run helper unit tests
        run: python -m unittest discover -s tests -p "test_backup_restore_drill.py" -v

      - name: Create dump and restore into a fresh database
        run: python scripts/backup_restore_drill.py --source-dsn "$TEST_DATABASE_URL"
