name: apply verified zero-reference alias retirement

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply verified local patch
        shell: bash
        run: |
          cat .github/pr224/part* > /tmp/pr224.patch.gz.b64
          echo "3c3453299be8293ae88959f94245b98f23f178e48dfc7c8c09ca0b137e215703  /tmp/pr224.patch.gz.b64" | sha256sum -c -
          base64 -d /tmp/pr224.patch.gz.b64 | gzip -d > /tmp/pr224.patch
          git apply --check /tmp/pr224.patch
          git apply --index /tmp/pr224.patch
          rm -rf .github/pr224
          rm -f .github/workflows/p3d-zero-reference-alias-apply.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor: retire zero-reference handler aliases"
          git push
