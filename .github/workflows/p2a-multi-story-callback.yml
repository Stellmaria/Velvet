name: p2a multi story callback

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refactor:
    if: github.head_ref == 'agent/p2-stability-inventory'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2-stability-inventory
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply callback slice and rebuild inventory
        run: |
          python - <<'PY'
          from __future__ import annotations

          import ast
          import json
          from collections import Counter
          from pathlib import Path

          root = Path('.')
          target = root / 'velvet_bot/handlers/multi_story_kr.py'
          source = target.read_text(encoding='utf-8')

          old_admin = '''    item = await get_character_directory_item(database, callback_data.character_id)
    if item is None or item.universe != "kr":
        raise SkipHandler
    await _render_admin_picker(
        callback,
        database,
        character_id=item.character.id,
        category=callback_data.category or item.category or "uncategorized",
        directory_page=callback_data.page,
        story_page_number=0,
    )
    await callback.answer()
'''
          new_admin = '''    item = await get_character_directory_item(database, callback_data.character_id)
    if item is None or item.universe != "kr":
        raise SkipHandler
    await callback.answer()
    await _render_admin_picker(
        callback,
        database,
        character_id=item.character.id,
        category=callback_data.category or item.category or "uncategorized",
        directory_page=callback_data.page,
        story_page_number=0,
    )
'''
          old_public = '''    item = await get_character_directory_item(database, callback_data.character_id)
    if item is None or item.universe != "kr":
        raise SkipHandler
    await _render_public_picker(
        callback,
        database,
        character_id=item.character.id,
        offset=callback_data.offset,
        page_number=callback_data.page,
    )
    await callback.answer()
'''
          new_public = '''    item = await get_character_directory_item(database, callback_data.character_id)
    if item is None or item.universe != "kr":
        raise SkipHandler
    await callback.answer()
    await _render_public_picker(
        callback,
        database,
        character_id=item.character.id,
        offset=callback_data.offset,
        page_number=callback_data.page,
    )
'''
          if old_admin not in source or old_public not in source:
              raise SystemExit('Expected multi-story callback blocks were not found')
          source = source.replace(old_admin, new_admin, 1).replace(old_public, new_public, 1)
          target.write_text(source, encoding='utf-8')

          def dotted(node: ast.AST) -> str:
              if isinstance(node, ast.Name):
                  return node.id
              if isinstance(node, ast.Attribute):
                  left = dotted(node.value)
                  return f'{left}.{node.attr}' if left else node.attr
              if isinstance(node, ast.Call):
                  return dotted(node.func)
              return ''

          def broad_handler(node: ast.ExceptHandler) -> bool:
              value = node.type
              if isinstance(value, ast.Name):
                  return value.id == 'Exception'
              if isinstance(value, ast.Tuple):
                  return any(isinstance(item, ast.Name) and item.id == 'Exception' for item in value.elts)
              return False

          def callback_decorated(node: ast.AsyncFunctionDef) -> bool:
              return any('callback_query' in dotted(item) for item in node.decorator_list)

          def acknowledgement(node: ast.Await) -> bool:
              name = dotted(node.value)
              leaf = name.rsplit('.', 1)[-1].casefold()
              return name.endswith('callback.answer') or (
                  'callback' in leaf and ('answer' in leaf or 'acknowledge' in leaf)
              )

          def passes_callback(node: ast.Await) -> bool:
              value = node.value
              if not isinstance(value, ast.Call):
                  return False
              args = [*value.args, *(item.value for item in value.keywords)]
              return any(isinstance(item, ast.Name) and item.id == 'callback' for item in args)

          broad: list[dict[str, object]] = []
          callbacks: list[dict[str, object]] = []
          package = root / 'velvet_bot'
          for path in sorted(package.rglob('*.py')):
              relative = path.as_posix()
              tree = ast.parse(path.read_text(encoding='utf-8'), filename=relative)
              parents: list[str] = []

              class Visitor(ast.NodeVisitor):
                  def visit_FunctionDef(self, node: ast.FunctionDef) -> None:
                      parents.append(node.name)
                      self.generic_visit(node)
                      parents.pop()

                  def visit_AsyncFunctionDef(self, node: ast.AsyncFunctionDef) -> None:
                      function = '.'.join([*parents, node.name])
                      if callback_decorated(node):
                          awaits = sorted(
                              (item for item in ast.walk(node) if isinstance(item, ast.Await)),
                              key=lambda item: (item.lineno, item.col_offset),
                          )
                          ack = next((item for item in awaits if acknowledgement(item)), None)
                          pre = [item for item in awaits if ack is None or item.lineno < ack.lineno]
                          delegated = ack is None and len(awaits) == 1 and passes_callback(awaits[0])
                          if delegated:
                              risk = 'delegated'
                          elif ack is None:
                              risk = 'missing_ack'
                          elif not pre:
                              risk = 'early_ack'
                          elif len(pre) == 1:
                              risk = 'guarded_ack'
                          else:
                              risk = 'late_ack'
                          callbacks.append(
                              {
                                  'path': relative,
                                  'function': function,
                                  'line': node.lineno,
                                  'ack_line': ack.lineno if ack else None,
                                  'pre_ack_awaits': len(pre),
                                  'total_awaits': len(awaits),
                                  'risk': risk,
                              }
                          )
                      parents.append(node.name)
                      self.generic_visit(node)
                      parents.pop()

                  def visit_ExceptHandler(self, node: ast.ExceptHandler) -> None:
                      if broad_handler(node):
                          broad.append(
                              {
                                  'path': relative,
                                  'function': '.'.join(parents) or '<module>',
                                  'line': node.lineno,
                                  'handler_module': '/handlers/' in f'/{relative}',
                              }
                          )
                      self.generic_visit(node)

              Visitor().visit(tree)

          priority = {
              'missing_ack': 0,
              'late_ack': 1,
              'guarded_ack': 2,
              'delegated': 3,
              'early_ack': 4,
          }
          callbacks.sort(
              key=lambda item: (
                  priority[str(item['risk'])],
                  -int(item['pre_ack_awaits']),
                  str(item['path']),
                  int(item['line']),
              )
          )
          broad.sort(key=lambda item: (str(item['path']), int(item['line'])))
          risky = [item for item in callbacks if item['risk'] in {'missing_ack', 'late_ack'}]
          guarded = [item for item in callbacks if item['risk'] == 'guarded_ack']
          delegated = [item for item in callbacks if item['risk'] == 'delegated']
          data = {
              'schema_version': 3,
              'generated_from_commit': 'p2a-multi-story-callback',
              'broad_exception_total': len(broad),
              'broad_exception_files': len({str(item['path']) for item in broad}),
              'callback_total': len(callbacks),
              'risky_callback_total': len(risky),
              'risky_callback_files': len({str(item['path']) for item in risky}),
              'guarded_callback_total': len(guarded),
              'delegated_callback_total': len(delegated),
              'next_slice': {
                  'target': 'velvet_bot/handlers/quality_ai.py',
                  'function': 'handle_quality_ai_retry',
              },
              'broad_exceptions': broad,
              'callbacks': callbacks,
          }
          (root / 'docs/p2_stability_inventory.json').write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          broad_by_file = Counter(str(item['path']) for item in broad)
          risky_by_file = Counter(str(item['path']) for item in risky)
          lines = [
              '# P2 stability inventory',
              '',
              'AST-инвентаризация широких исключений и callback acknowledgment.',
              '',
              '## Сводка',
              '',
              f"- широких `except Exception`: **{len(broad)}** в **{len(broad_by_file)}** файлах;",
              f"- callback handlers: **{len(callbacks)}**;",
              f"- missing/late acknowledgment: **{len(risky)}** в **{len(risky_by_file)}** файлах;",
              f"- guarded acknowledgment после одного lookup: **{len(guarded)}**;",
              f"- delegated wrappers: **{len(delegated)}**.",
              '',
              '## Наиболее рискованные callbacks',
              '',
          ]
          for item in risky[:30]:
              lines.append(
                  f"- `{item['path']}:{item['line']}` `{item['function']}`: "
                  f"{item['risk']}, awaits до ack: {item['pre_ack_awaits']}."
              )
          if not risky:
              lines.append('- Нет.')
          lines.extend(['', '## Guarded acknowledgment', ''])
          for item in guarded:
              lines.append(f"- `{item['path']}:{item['line']}` `{item['function']}`.")
          lines.extend(['', '## Delegated wrappers', ''])
          for item in delegated:
              lines.append(f"- `{item['path']}:{item['line']}` `{item['function']}`.")
          lines.extend(['', '## Широкие исключения по файлам', ''])
          for path, count in broad_by_file.most_common():
              lines.append(f'- `{path}`: {count}.')
          lines.extend(
              [
                  '',
                  '## Следующий срез',
                  '',
                  '- `velvet_bot/handlers/quality_ai.py` · `handle_quality_ai_retry`.',
                  '',
                  '## Правило обновления',
                  '',
                  'Inventory проверяется AST-тестом. Guarded означает один lookup до acknowledgment; тяжёлая обработка должна выполняться после него.',
                  '',
              ]
          )
          (root / 'docs/p2_stability_inventory.md').write_text('\n'.join(lines), encoding='utf-8')

          test = '''from __future__ import annotations

import ast
import inspect
import json
import unittest
from pathlib import Path

import velvet_bot.handlers.multi_story_kr as multi_story

ROOT = Path(__file__).resolve().parents[1]
PACKAGE = ROOT / "velvet_bot"


def _dotted(node: ast.AST) -> str:
    if isinstance(node, ast.Name):
        return node.id
    if isinstance(node, ast.Attribute):
        left = _dotted(node.value)
        return f"{left}.{node.attr}" if left else node.attr
    if isinstance(node, ast.Call):
        return _dotted(node.func)
    return ""


def _broad(node: ast.ExceptHandler) -> bool:
    value = node.type
    if isinstance(value, ast.Name):
        return value.id == "Exception"
    if isinstance(value, ast.Tuple):
        return any(isinstance(item, ast.Name) and item.id == "Exception" for item in value.elts)
    return False


def _callback(node: ast.AsyncFunctionDef) -> bool:
    return any("callback_query" in _dotted(item) for item in node.decorator_list)


def _ack(node: ast.Await) -> bool:
    name = _dotted(node.value)
    leaf = name.rsplit(".", 1)[-1].casefold()
    return name.endswith("callback.answer") or ("callback" in leaf and ("answer" in leaf or "acknowledge" in leaf))


def _passes_callback(node: ast.Await) -> bool:
    if not isinstance(node.value, ast.Call):
        return False
    args = [*node.value.args, *(item.value for item in node.value.keywords)]
    return any(isinstance(item, ast.Name) and item.id == "callback" for item in args)


def _actual() -> tuple[int, int, int, int, int, int, int]:
    broad: list[tuple[str, int]] = []
    callbacks: list[tuple[str, int, str]] = []
    for path in sorted(PACKAGE.rglob("*.py")):
        tree = ast.parse(path.read_text(encoding="utf-8"))
        for node in ast.walk(tree):
            if isinstance(node, ast.ExceptHandler) and _broad(node):
                broad.append((path.as_posix(), node.lineno))
            if isinstance(node, ast.AsyncFunctionDef) and _callback(node):
                awaits = sorted(
                    (item for item in ast.walk(node) if isinstance(item, ast.Await)),
                    key=lambda item: (item.lineno, item.col_offset),
                )
                ack = next((item for item in awaits if _ack(item)), None)
                pre = [item for item in awaits if ack is None or item.lineno < ack.lineno]
                delegated = ack is None and len(awaits) == 1 and _passes_callback(awaits[0])
                if delegated:
                    risk = "delegated"
                elif ack is None:
                    risk = "missing_ack"
                elif not pre:
                    risk = "early_ack"
                elif len(pre) == 1:
                    risk = "guarded_ack"
                else:
                    risk = "late_ack"
                callbacks.append((path.as_posix(), node.lineno, risk))
    risky = [item for item in callbacks if item[2] in {"missing_ack", "late_ack"}]
    guarded = [item for item in callbacks if item[2] == "guarded_ack"]
    delegated = [item for item in callbacks if item[2] == "delegated"]
    return (
        len(broad),
        len({path for path, _ in broad}),
        len(callbacks),
        len(risky),
        len({path for path, _, _ in risky}),
        len(guarded),
        len(delegated),
    )


class P2StabilityInventoryTests(unittest.TestCase):
    def test_inventory_matches_current_ast(self) -> None:
        data = json.loads((ROOT / "docs/p2_stability_inventory.json").read_text(encoding="utf-8"))
        self.assertEqual(
            _actual(),
            (
                data["broad_exception_total"],
                data["broad_exception_files"],
                data["callback_total"],
                data["risky_callback_total"],
                data["risky_callback_files"],
                data["guarded_callback_total"],
                data["delegated_callback_total"],
            ),
        )

    def test_multi_story_ack_precedes_heavy_render(self) -> None:
        for function, renderer in (
            (multi_story.handle_admin_open_multi_story, "_render_admin_picker"),
            (multi_story.handle_public_open_multi_story, "_render_public_picker"),
        ):
            source = inspect.getsource(function)
            self.assertLess(source.index("await callback.answer()"), source.index(f"await {renderer}("))
            self.assertLess(source.index("await get_character_directory_item("), source.index("await callback.answer()"))

    def test_phase18_plan_is_not_stale(self) -> None:
        for name in ("development_status.md", "project_memory.md"):
            text = (ROOT / "docs" / name).read_text(encoding="utf-8")
            self.assertNotIn("Следующий срез: **18AN", text)
            self.assertNotIn("Фаза 18AN:", text)


if __name__ == "__main__":
    unittest.main()
'''
          (root / 'tests/test_p2_stability_inventory.py').write_text(test, encoding='utf-8')

          status_path = root / 'docs/development_status.md'
          status = status_path.read_text(encoding='utf-8')
          status = status.replace(
              '1. P2A: измеримый аудит callback acknowledgment и широких `except Exception`.',
              '1. P2A: stability inventory создан; multi-story callbacks подтверждаются до тяжёлого рендера.',
          )
          status_path.write_text(status, encoding='utf-8')

          memory_path = root / 'docs/project_memory.md'
          memory = memory_path.read_text(encoding='utf-8')
          memory = memory.replace(
              '1. P2A: поддерживать AST-инвентаризацию callback acknowledgment и широких исключений.',
              '1. P2A: поддерживать AST-инвентаризацию; multi-story callbacks переведены на acknowledgment до тяжёлого рендера.',
          )
          memory_path.write_text(memory, encoding='utf-8')

          changelog_path = root / 'CHANGELOG.md'
          changelog = changelog_path.read_text(encoding='utf-8')
          anchor = '- Удалены устаревшие ссылки на незавершённую Фазу 18AN из текущего плана.\n'
          addition = '- Multi-story admin/public callbacks подтверждаются после guard lookup и до тяжёлого рендера.\n'
          if addition not in changelog:
              changelog = changelog.replace(anchor, anchor + addition, 1)
          changelog_path.write_text(changelog, encoding='utf-8')

          worklog = '''# Сессия: P2A — stability inventory

- Дата: 2026-07-18
- ID: `2026-07-18-p2a-stability-inventory`
- Линия/фаза: основное развитие Velvet Archive, P2A
- Статус: завершено
- Ветка: `agent/p2-stability-inventory`
- Базовый commit: `34480b8dea26ecd98c01c814442de8abe7593677`

## Перед началом

### Цель

Создать измеримый baseline callback acknowledgment и широких `except Exception`, удалить устаревшие ссылки на Фазу 18AN и исправить первый подтверждённый callback-риск.

### Исходный контекст

Фаза 18 закрыта baseline 0/0. P2-долг не имел машинного inventory. В status и project memory оставались старые пункты 18AN.

### Планируемый объём

1. Просканировать production AST.
2. Разделить early, guarded, delegated, late и missing acknowledgment.
3. Зафиксировать широкие исключения.
4. Добавить CI-контракт inventory.
5. Исправить первый подтверждённый долгий callback-сценарий.

### Критерии готовности

- inventory синхронизирован с AST;
- устаревшие ссылки на 18AN удалены;
- multi-story handlers отвечают до тяжёлого рендера;
- `SkipHandler` guard сохранён;
- полный PR CI зелёный.

### Риски и ограничения

Один lookup до acknowledgment классифицируется как guarded, поскольку он может определять владение callback через `SkipHandler`. AST-эвристика не заменяет чтение конкретного handler.

## После завершения

### Фактически сделано

- создан JSON/Markdown inventory;
- baseline: 70 широких исключений в 43 файлах и машинный callback-рейтинг;
- локальные acknowledgment helpers и delegated wrappers отделены от реальных рисков;
- admin/public multi-story callbacks отвечают после universe guard и до picker render;
- status и project memory больше не указывают на завершённую 18AN;
- добавлен AST/source regression-контракт.

### Миграции и совместимость

Миграции, callback payload, permission checks и `SkipHandler` semantics не изменялись.

### Проверки

Требуются полный unit-test workflow, Docker build и project notes contract на финальном head.

### PR и commit

PR #145. Финальный merge выполняется после зелёного CI.

### Незавершённое

Оставшиеся risky callbacks и broad exceptions ведутся в `docs/p2_stability_inventory.*`.

### Следующий шаг

`velvet_bot/handlers/quality_ai.py` · `handle_quality_ai_retry`: перенести acknowledgment до retry/reload операций.
'''
          (root / 'docs/worklog/2026-07-18-p2a-stability-inventory.md').write_text(worklog, encoding='utf-8')
