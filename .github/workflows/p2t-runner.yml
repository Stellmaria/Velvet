name: p2t runner

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2t-guest-archive-boundaries'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2t-guest-archive-boundaries
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python scripts/update_p2_stability_inventory.py --label p2t-guest-archive-boundaries --schema-version 22
      - run: python .github/p2t_docs.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/p2t_docs.py .github/workflows/p2t-runner.yml
          git add -A
          git commit -m "P2T update"
          git push origin HEAD:agent/p2t-guest-archive-boundaries
