name: temporary finalize workspace foundation

on:
  push:
    branches:
      - agent/workspace-foundation

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/workspace-foundation
          fetch-depth: 0

      - name: Finalize workspace foundation
        run: python scripts/temp_finalize_workspace_foundation.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize workspace foundation contracts"
          git push origin HEAD:agent/workspace-foundation
