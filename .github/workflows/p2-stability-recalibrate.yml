name: p2 stability recalibrate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  recalibrate:
    if: github.head_ref == 'agent/p2-stability-inventory'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2-stability-inventory
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Rebuild inventory
        run: |
          python - <<'PY'
          from __future__ import annotations

          import ast
          import json
          from collections import Counter
          from pathlib import Path

          root = Path('.')
          package = root / 'velvet_bot'

          def dotted(node: ast.AST) -> str:
              if isinstance(node, ast.Name):
                  return node.id
              if isinstance(node, ast.Attribute):
                  left = dotted(node.value)
                  return f'{left}.{node.attr}' if left else node.attr
              if isinstance(node, ast.Call):
                  return dotted(node.func)
              return ''

          def broad_handler(node: ast.ExceptHandler) -> bool:
              value = node.type
              if isinstance(value, ast.Name):
                  return value.id == 'Exception'
              if isinstance(value, ast.Tuple):
                  return any(isinstance(item, ast.Name) and item.id == 'Exception' for item in value.elts)
              return False

          def callback_decorated(node: ast.AsyncFunctionDef) -> bool:
              return any('callback_query' in dotted(item) for item in node.decorator_list)

          def acknowledgement(node: ast.Await) -> bool:
              name = dotted(node.value)
              leaf = name.rsplit('.', 1)[-1].casefold()
              return (
                  name.endswith('callback.answer')
                  or ('callback' in leaf and ('answer' in leaf or 'acknowledge' in leaf))
              )

          def passes_callback(node: ast.Await) -> bool:
              value = node.value
              if not isinstance(value, ast.Call):
                  return False
              arguments = [*value.args, *(item.value for item in value.keywords)]
              return any(isinstance(item, ast.Name) and item.id == 'callback' for item in arguments)

          broad: list[dict[str, object]] = []
          callbacks: list[dict[str, object]] = []

          for path in sorted(package.rglob('*.py')):
              relative = path.as_posix()
              tree = ast.parse(path.read_text(encoding='utf-8'), filename=relative)
              parents: list[str] = []

              class Visitor(ast.NodeVisitor):
                  def visit_FunctionDef(self, node: ast.FunctionDef) -> None:
                      parents.append(node.name)
                      self.generic_visit(node)
                      parents.pop()

                  def visit_AsyncFunctionDef(self, node: ast.AsyncFunctionDef) -> None:
                      function = '.'.join([*parents, node.name])
                      if callback_decorated(node):
                          awaits = sorted(
                              (item for item in ast.walk(node) if isinstance(item, ast.Await)),
                              key=lambda item: (item.lineno, item.col_offset),
                          )
                          ack = next((item for item in awaits if acknowledgement(item)), None)
                          pre_ack = [item for item in awaits if ack is None or item.lineno < ack.lineno]
                          delegated = ack is None and len(awaits) == 1 and passes_callback(awaits[0])
                          risk = (
                              'delegated'
                              if delegated
                              else (
                                  'missing_ack'
                                  if ack is None
                                  else ('late_ack' if pre_ack else 'early_ack')
                              )
                          )
                          callbacks.append(
                              {
                                  'path': relative,
                                  'function': function,
                                  'line': node.lineno,
                                  'ack_line': ack.lineno if ack else None,
                                  'pre_ack_awaits': len(pre_ack),
                                  'total_awaits': len(awaits),
                                  'risk': risk,
                              }
                          )
                      parents.append(node.name)
                      self.generic_visit(node)
                      parents.pop()

                  def visit_ExceptHandler(self, node: ast.ExceptHandler) -> None:
                      if broad_handler(node):
                          broad.append(
                              {
                                  'path': relative,
                                  'function': '.'.join(parents) or '<module>',
                                  'line': node.lineno,
                                  'handler_module': '/handlers/' in f'/{relative}',
                              }
                          )
                      self.generic_visit(node)

              Visitor().visit(tree)

          priority = {'missing_ack': 0, 'late_ack': 1, 'delegated': 2, 'early_ack': 3}
          callbacks.sort(
              key=lambda item: (
                  priority[str(item['risk'])],
                  -int(item['pre_ack_awaits']),
                  str(item['path']),
                  int(item['line']),
              )
          )
          broad.sort(key=lambda item: (str(item['path']), int(item['line'])))
          risky = [item for item in callbacks if item['risk'] in {'missing_ack', 'late_ack'}]
          delegated = [item for item in callbacks if item['risk'] == 'delegated']

          data = {
              'schema_version': 2,
              'generated_from_commit': 'p2a-stability-audit',
              'broad_exception_total': len(broad),
              'broad_exception_files': len({str(item['path']) for item in broad}),
              'callback_total': len(callbacks),
              'risky_callback_total': len(risky),
              'risky_callback_files': len({str(item['path']) for item in risky}),
              'delegated_callback_total': len(delegated),
              'next_slice': None,
              'broad_exceptions': broad,
              'callbacks': callbacks,
          }
          (root / 'docs/p2_stability_inventory.json').write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          broad_by_file = Counter(str(item['path']) for item in broad)
          risky_by_file = Counter(str(item['path']) for item in risky)
          lines = [
              '# P2 stability inventory',
              '',
              'AST-инвентаризация широких исключений и callback acknowledgment.',
              '',
              '## Сводка',
              '',
              f"- широких `except Exception`: **{len(broad)}** в **{len(broad_by_file)}** файлах;",
              f"- callback handlers: **{len(callbacks)}**;",
              f"- handlers с поздним или отсутствующим acknowledgment: **{len(risky)}** в **{len(risky_by_file)}** файлах;",
              f"- одношаговых delegated wrappers для ручного контроля: **{len(delegated)}**.",
              '',
              '## Наиболее рискованные callbacks',
              '',
          ]
          for item in risky[:30]:
              lines.append(
                  f"- `{item['path']}:{item['line']}` `{item['function']}`: "
                  f"{item['risk']}, awaits до ack: {item['pre_ack_awaits']}."
              )
          if not risky:
              lines.append('- Нет.')
          lines.extend(['', '## Delegated wrappers', ''])
          for item in delegated:
              lines.append(f"- `{item['path']}:{item['line']}` `{item['function']}`.")
          if not delegated:
              lines.append('- Нет.')
          lines.extend(['', '## Широкие исключения по файлам', ''])
          for path, count in broad_by_file.most_common():
              lines.append(f'- `{path}`: {count}.')
          lines.extend(
              [
                  '',
                  '## Правило обновления',
                  '',
                  'Inventory проверяется AST-тестом. Эвристика различает direct/helper acknowledgment и одношаговое delegation.',
                  '',
              ]
          )
          (root / 'docs/p2_stability_inventory.md').write_text('\n'.join(lines), encoding='utf-8')

          test_path = root / 'tests/test_p2_stability_inventory.py'
          test = test_path.read_text(encoding='utf-8')
          test = test.replace(
              'return name.endswith("callback.answer") or name.endswith("_safe_callback_answer") or name.endswith("safe_callback_answer")',
              'leaf = name.rsplit(".", 1)[-1].casefold()\n    return name.endswith("callback.answer") or ("callback" in leaf and ("answer" in leaf or "acknowledge" in leaf))',
          )
          test = test.replace(
              'callbacks: list[tuple[str, int, str]] = []',
              'callbacks: list[tuple[str, int, str]] = []',
          )
          test = test.replace(
              'pre = [item for item in awaits if ack is None or item.lineno < ack.lineno]\n                callbacks.append((path.as_posix(), node.lineno, "missing_ack" if ack is None else ("late_ack" if pre else "early_ack")))',
              'pre = [item for item in awaits if ack is None or item.lineno < ack.lineno]\n                delegated = ack is None and len(awaits) == 1 and isinstance(awaits[0].value, ast.Call) and any(isinstance(arg, ast.Name) and arg.id == "callback" for arg in [*awaits[0].value.args, *(kw.value for kw in awaits[0].value.keywords)])\n                risk = "delegated" if delegated else ("missing_ack" if ack is None else ("late_ack" if pre else "early_ack"))\n                callbacks.append((path.as_posix(), node.lineno, risk))',
          )
          test = test.replace(
              'risky = [item for item in callbacks if item[2] != "early_ack"]',
              'risky = [item for item in callbacks if item[2] in {"missing_ack", "late_ack"}]',
          )
          test_path.write_text(test, encoding='utf-8')
          PY

      - name: Commit recalibrated inventory
        run: |
          rm .github/workflows/p2-stability-recalibrate.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P2A: уточнить callback audit"
          git push origin HEAD:agent/p2-stability-inventory
