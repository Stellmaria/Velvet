name: p2p runner

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2p-backup-center-boundary'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2p-backup-center-boundary
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: git apply .github/p2p.patch
      - run: python scripts/update_p2_stability_inventory.py --label p2p-backup-center-boundary --schema-version 18
      - run: python .github/p2p_docs.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/p2p.patch .github/p2p_docs.py .github/workflows/p2p-runner.yml
          git add -A
          git commit -m "P2P update"
          git push origin HEAD:agent/p2p-backup-center-boundary
