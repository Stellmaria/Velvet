name: p2ai runner

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2ai-archive-preview-fallback'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply P2AI
        run: |
          python .github/scripts/p2ai_apply.py
          python .github/scripts/p2ai_docs.py
          python scripts/update_p2_stability_inventory.py --label p2ai-archive-preview-fallback --schema-version 37
          rm .github/scripts/p2ai_apply.py
          rm .github/scripts/p2ai_docs.py
          rm .github/workflows/p2ai-runner.yml
      - name: Commit generated result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Complete P2AI archive preview fallback"
          git push origin HEAD:${{ github.head_ref }}
