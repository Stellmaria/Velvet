name: temporary P3E media set AI move

on:
  push:
    branches:
      - agent/p3e-move-media-set-ai-repository

permissions:
  contents: write

jobs:
  move:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/p3e-move-media-set-ai-repository
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Migrate canonical imports
        run: |
          python - <<'PY'
          from pathlib import Path

          service = Path('velvet_bot/media_set_ai_discovery.py')
          text = service.read_text(encoding='utf-8')
          old = 'from velvet_bot.media_set_ai_repository import ('
          new = 'from velvet_bot.domains.media_sets.discovery_repository import ('
          if old not in text:
              raise SystemExit('media set AI discovery import not found')
          service.write_text(text.replace(old, new, 1), encoding='utf-8')

          test = Path('tests/test_phase18am_media_set_ai_repository.py')
          text = test.read_text(encoding='utf-8')
          replacements = (
              (
                  'import velvet_bot.media_set_ai_repository as repository_module',
                  'import velvet_bot.domains.media_sets.discovery_repository as repository_module',
              ),
              (
                  'from velvet_bot.media_set_ai_repository import (',
                  'from velvet_bot.domains.media_sets.discovery_repository import (',
              ),
          )
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'media set AI test import not found: {old}')
              text = text.replace(old, new, 1)
          test.write_text(text, encoding='utf-8')

          old_repository = Path('velvet_bot/media_set_ai_repository.py')
          if not old_repository.is_file():
              raise SystemExit('old media_set_ai_repository.py not found')
          old_repository.unlink()
          PY

      - name: Generate inventories
        run: |
          python scripts/inventory_repository_layout.py --write --label p3e-repository-layout-baseline
          python scripts/inventory_architecture_layout.py --write --label p3d-analytics-alias-retirement

      - name: Commit move
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Move media set AI repository into media sets domain"
          git push origin HEAD:agent/p3e-move-media-set-ai-repository
