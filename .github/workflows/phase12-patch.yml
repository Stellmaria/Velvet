name: phase12 discussion cleanup patch

on:
  push:
    branches:
      - agent/phase12-discussion-cleanup

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase12-discussion-cleanup
          fetch-depth: 0

      - name: Apply exact architectural patch
        run: python scripts/_phase12_patch.py

      - name: Commit patched sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Фаза 12: вынести навигацию и parent lookup обсуждений"
          git push origin HEAD:agent/phase12-discussion-cleanup
