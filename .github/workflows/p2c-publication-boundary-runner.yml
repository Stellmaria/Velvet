name: p2c publication boundary runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  run-slice:
    if: github.head_ref == 'agent/p2c-publication-boundaries'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2c-publication-boundaries
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply publication boundary slice
        run: python scripts/_p2c_publication_boundaries.py

      - name: Commit publication boundary slice
        run: |
          rm -f .github/workflows/p2c-publication-boundary-runner.yml
          rm -f scripts/_p2c_publication_boundaries.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P2C: классифицировать publication boundaries"
          git push origin HEAD:agent/p2c-publication-boundaries
