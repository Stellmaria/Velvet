name: temp fix workspace guided ci

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-guided-menu-navigation
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply contract fixes
        run: python tools/temp_fix_workspace_guided_ci.py

      - name: Refresh generated inventories
        run: |
          python scripts/inventory_architecture_layout.py --write --label p3d-analytics-alias-retirement
          python scripts/inventory_repository_layout.py --write --label p3e-repository-layout-complete
          python scripts/update_p2_stability_inventory.py --label workspace-guided-menu-navigation --schema-version 56
          python scripts/telegram_navigation_inventory.py --root velvet_bot --markdown docs/generated/telegram_navigation_inventory.md

      - name: Validate generated state
        run: |
          python -m compileall -q velvet_bot tests
          python scripts/inventory_architecture_layout.py --check --label p3d-analytics-alias-retirement
          python scripts/inventory_repository_layout.py --check --label p3e-repository-layout-complete
          python scripts/telegram_navigation_inventory.py --root velvet_bot --check
          git diff --check

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Align guided workspace menu with project contracts"
          git push origin HEAD:agent/workspace-guided-menu-navigation
