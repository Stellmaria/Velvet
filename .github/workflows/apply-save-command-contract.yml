name: Apply canonical save command contract

on:
  push:
    branches:
      - agent/workspace-home-presentation-contracts
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-slice:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Apply canonical save command contract'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-home-presentation-contracts
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Apply save command cleanup
        run: python .github/apply-save-command-contract.py
      - name: Refresh Telegram navigation inventory
        run: |
          python scripts/telegram_navigation_inventory.py \
            --root velvet_bot \
            --markdown docs/generated/telegram_navigation_inventory.md
          python scripts/telegram_navigation_inventory.py --root velvet_bot --check
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Compile changed modules
        run: |
          python -m compileall \
            velvet_bot/presentation/telegram/save_mode_runtime.py \
            velvet_bot/presentation/telegram/workspace_command_menu.py \
            tests/test_save_single_and_set_modes.py
      - name: Test save command contract
        run: |
          python -m unittest -v \
            tests.test_save_single_and_set_modes \
            tests.test_save_forwarded_media_routing \
            tests.test_workspace_home_presentation_contracts \
            tests.test_owner_menu_compat \
            tests.test_telegram_navigation_inventory
      - name: Remove transformation assets
        run: |
          rm .github/apply-save-command-contract.py
          rm .github/workflows/apply-save-command-contract.yml
      - name: Commit applied slice
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Apply canonical save command contract"
          git push origin HEAD:agent/workspace-home-presentation-contracts
