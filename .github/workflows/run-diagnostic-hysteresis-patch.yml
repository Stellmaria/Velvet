name: Run diagnostic hysteresis patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/fix-diagnostic-hysteresis-cascade' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-diagnostic-hysteresis-cascade
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply patch
        run: python tools/apply_diagnostic_hysteresis_patch.py

      - name: Validate syntax
        run: python -m py_compile velvet_bot/services/diagnostic_bundle.py tests/test_owner_diagnostic_bundles.py

      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Require sustained Telegram failure before diagnostics"
          git push origin HEAD:agent/fix-diagnostic-hysteresis-cascade
