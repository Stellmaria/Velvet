name: p2h bootstrap fatal

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2h-bootstrap-fatal-boundaries'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2h-bootstrap-fatal-boundaries
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python .github/scripts/p2h_apply.py
      - run: base64 -d .github/data/p2h_test.b64 > tests/test_p2h_bootstrap_fatal_boundaries.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/scripts/p2h_apply.py .github/data/p2h_test.b64 .github/workflows/p2h-bootstrap-fatal.yml
          git add -A
          git commit -m "P2H: classify bootstrap fatal boundaries"
          git push origin HEAD:agent/p2h-bootstrap-fatal-boundaries
