name: temporary owner diagnostic fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/owner-diagnostic-zip-bundles
          fetch-depth: 0

      - name: Fix diagnostic log buffer lock
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('velvet_bot/services/diagnostic_bundle.py')
          text = path.read_text(encoding='utf-8')
          old = 'self._lock'
          if text.count(old) != 3:
              raise SystemExit(f'unexpected diagnostic lock reference count: {text.count(old)}')
          path.write_text(text.replace(old, 'self._entries_lock'), encoding='utf-8')
          PY

      - name: Compile changed Python modules
        run: |
          python -m compileall -q velvet_bot tests/test_owner_diagnostic_bundles.py

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add velvet_bot/services/diagnostic_bundle.py
          git commit -m "Fix diagnostic log buffer locking"
          git push origin HEAD:agent/owner-diagnostic-zip-bundles
