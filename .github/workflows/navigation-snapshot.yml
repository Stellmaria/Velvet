name: apply global navigation audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/global-navigation-audit' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply reviewed navigation patch
        run: |
          cat scripts/.navpatch-* | tr -d '\n' | base64 -d > scripts/temp_apply_navigation.py
          python scripts/temp_apply_navigation.py
          rm -f scripts/.navpatch-*
          python scripts/telegram_navigation_inventory.py --root velvet_bot --check
          python -m compileall -q velvet_bot scripts tests

      - name: Commit navigation changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Standardize global Telegram navigation"
          git push origin HEAD:agent/global-navigation-audit
