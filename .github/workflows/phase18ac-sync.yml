name: phase18ac sync docs

on:
  push:
    branches:
      - agent/phase18ac-telegram-import-acquire

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase18ac-telegram-import-acquire
          fetch-depth: 0

      - name: Synchronize Phase 18AC baseline and project notes
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one occurrence, found {count}: {old!r}')
              target.write_text(text.replace(old, new), encoding='utf-8')

          baseline_path = Path('docs/private_pool_inventory.json')
          baseline = json.loads(baseline_path.read_text(encoding='utf-8'))
          files = [item for item in baseline['files'] if item['path'] != 'velvet_bot/telegram_export_import.py']
          if len(files) != len(baseline['files']) - 1:
              raise SystemExit('telegram_export_import.py baseline entry was not removed exactly once')
          baseline['generated_from_commit'] = 'd3a3633aad512a44ee19f74711099eb9826a8480'
          baseline['total_external_findings'] = 63
          baseline['total_files'] = 18
          baseline['next_slice'] = {
              'phase': '18AD',
              'target': 'velvet_bot/public_media_lookup.py',
          }
          baseline['files'] = files
          baseline_path.write_text(
              json.dumps(baseline, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          replace_exact(
              'tests/test_phase18m_private_pool_inventory.py',
              'self.assertEqual(67, len(inventory.external_findings(findings)))\n        self.assertEqual(19, len(inventory.summarize_external(findings)))',
              'self.assertEqual(63, len(inventory.external_findings(findings)))\n        self.assertEqual(18, len(inventory.summarize_external(findings)))',
          )

          replace_exact(
              'docs/private_pool_inventory.md',
              'Последний завершённый срез: Фаза 18AB, базовый `BackupService` в `backup_service.py`.',
              'Последний завершённый срез: Фаза 18AC, Telegram import persistence в `telegram_export_import.py`.',
          )
          replace_exact(
              'docs/private_pool_inventory.md',
              '- 67 внешних обращений к `Database._require_pool()`;\n- 19 production-файлов;',
              '- 63 внешних обращения к `Database._require_pool()`;\n- 18 production-файлов;',
          )
          replace_exact(
              'docs/private_pool_inventory.md',
              '| Legacy query-модули | 53 | постепенно превращать в repositories/queries, не ограничиваться заменой метода |',
              '| Legacy query-модули | 49 | постепенно превращать в repositories/queries, не ограничиваться заменой метода |',
          )
          replace_exact(
              'docs/private_pool_inventory.md',
              'Всего: 67.',
              'Всего: 63.',
          )
          replace_exact(
              'docs/private_pool_inventory.md',
              '- Фаза 18AB: базовый `BackupService`, удалены 15 обращений и 1 production-файл; running/completed/failed lifecycle, create/verify/history, settings, validation, retention и scheduled checks сохранены.',
              '- Фаза 18AB: базовый `BackupService`, удалены 15 обращений и 1 production-файл; running/completed/failed lifecycle, create/verify/history, settings, validation, retention и scheduled checks сохранены.\n- Фаза 18AC: Telegram import persistence, удалены 4 обращения и 1 production-файл; source registration, discussion filters, SHA-256 duplicate short-circuit и единая import transaction сохранены.',
          )
          replace_exact(
              'docs/private_pool_inventory.md',
              '### Волна B. Infrastructure\n\n1. **Фаза 18AC:** Telegram import persistence, 4 connection points.\n\n### Волна C. Старые query-модули',
              '### Волна C. Старые query-модули\n\n1. **Фаза 18AD:** public media lookup, 1 connection point.\n2. Discussion thread linking и analytics reactions отдельным малым срезом.',
          )

          replace_exact(
              'docs/project_memory.md',
              'Статус: срезы 18A–18AB реализованы, baseline продолжает уменьшаться.',
              'Статус: срезы 18A–18AC реализованы, baseline продолжает уменьшаться.',
          )
          replace_exact(
              'docs/project_memory.md',
              '- 18AB: базовый `BackupService` в `backup_service.py`.',
              '- 18AB: базовый `BackupService` в `backup_service.py`;\n- 18AC: Telegram import persistence в `telegram_export_import.py`.',
          )
          replace_exact(
              'docs/project_memory.md',
              '- после 18AB: 67 обращений в 19 файлах;\n- repository-классы внутри крупных модулей и весь backup infrastructure полностью удалены из baseline;',
              '- после 18AB: 67 обращений в 19 файлах;\n- после 18AC: 63 обращения в 18 файлах;\n- repository-классы внутри крупных модулей, backup infrastructure и Telegram import persistence полностью удалены из baseline;',
          )
          replace_exact(
              'docs/project_memory.md',
              'Следующий срез: **18AC, Telegram import persistence**, 4 connection points.',
              'Следующий срез: **18AD, public media lookup query boundary**, 1 connection point.',
          )
          replace_exact(
              'docs/project_memory.md',
              '1. Фаза 18AC: Telegram import persistence, baseline 67 → 63.\n2. Продолжить старые query-модули Фазы 18 отдельными срезами.',
              '1. Фаза 18AD: public media lookup query boundary, baseline 63 → 62.\n2. Продолжить старые query-модули Фазы 18 отдельными срезами.',
          )

          replace_exact(
              'docs/development_status.md',
              'Статус: срезы 18A–18AB реализованы, работа продолжается.',
              'Статус: срезы 18A–18AC реализованы, работа продолжается.',
          )
          replace_exact(
              'docs/development_status.md',
              '- базовый Backup Service в `backup_service.py`.',
              '- базовый Backup Service в `backup_service.py`;\n- Telegram import persistence в `telegram_export_import.py`.',
          )
          replace_exact(
              'docs/development_status.md',
              '- после 18AB: 67 в 19 файлах;\n- repository-классы внутри крупных модулей и весь backup infrastructure полностью удалены из baseline;',
              '- после 18AB: 67 в 19 файлах;\n- после 18AC: 63 в 18 файлах;\n- repository-классы внутри крупных модулей, backup infrastructure и Telegram import persistence полностью удалены из baseline;',
          )
          replace_exact(
              'docs/development_status.md',
              'Следующий срез: **18AC, Telegram import persistence**, 4 connection points. Ожидаемый baseline: 63 обращения в 18 файлах.',
              'Следующий срез: **18AD, public media lookup query boundary**, 1 connection point. Ожидаемый baseline: 62 обращения в 17 файлах.',
          )
          replace_exact(
              'docs/development_status.md',
              '1. Фаза 18AC: Telegram import persistence.\n2. Продолжить старые query-модули Фазы 18 отдельными срезами.',
              '1. Фаза 18AD: public media lookup query boundary.\n2. Продолжить старые query-модули Фазы 18 отдельными срезами.',
          )

          replace_exact(
              'CHANGELOG.md',
              'runtime Backup Service и базовый Backup Service больше не обращаются к приватному `_require_pool()`;',
              'runtime Backup Service, базовый Backup Service и Telegram import persistence больше не обращаются к приватному `_require_pool()`;',
          )
          replace_exact(
              'CHANGELOG.md',
              '- private pool baseline уменьшен с 130 обращений в 35 production-файлах до 67 обращений в 19 файлах;',
              '- private pool baseline уменьшен с 130 обращений в 35 production-файлах до 63 обращений в 18 файлах;',
          )
          replace_exact(
              'CHANGELOG.md',
              '- repository-классы внутри крупных модулей и весь backup infrastructure удалены из private pool baseline;',
              '- repository-классы внутри крупных модулей, весь backup infrastructure и Telegram import persistence удалены из private pool baseline;',
          )

          Path('.github/workflows/phase18ac-sync.yml').unlink()
          PY

      - name: Commit synchronized Phase 18AC state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/private_pool_inventory.json docs/private_pool_inventory.md docs/project_memory.md docs/development_status.md CHANGELOG.md tests/test_phase18m_private_pool_inventory.py .github/workflows/phase18ac-sync.yml
          git commit -m "docs: синхронизировать baseline после Фазы 18AC"
          git push origin HEAD:agent/phase18ac-telegram-import-acquire
