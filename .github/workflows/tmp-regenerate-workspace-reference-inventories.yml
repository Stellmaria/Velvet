name: temporary workspace reference inventory regeneration

on:
  push:
    branches:
      - agent/workspace-reference-library
    paths:
      - .github/workflows/tmp-regenerate-workspace-reference-inventories.yml

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/workspace-reference-library
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Fix callback and duplicate-route contracts
        run: |
          python - <<'PY'
          from pathlib import Path

          router_path = Path("velvet_bot/presentation/telegram/routers/workspace_reference_library.py")
          source = router_path.read_text(encoding="utf-8")
          source = source.replace("    ReferenceWorkspaceAccess,\n", "")
          old = '''@router.callback_query(
              ReferenceCallback.filter(),
              PersonalReferenceWorkspaceFilter("viewer"),
          )
          async def handle_workspace_reference_callback(
          '''
          helper = '''async def _handle_workspace_reference_callback(
          '''
          if old not in source:
              raise SystemExit("workspace reference callback signature not found")
          source = source.replace(old, helper, 1)
          wrapper = '''@router.callback_query(
              ReferenceCallback.filter(),
              PersonalReferenceWorkspaceFilter("viewer"),
          )
          async def handle_workspace_reference_callback(
              callback: CallbackQuery,
              callback_data: ReferenceCallback,
              personal_reference_context: PersonalReferenceContext,
              database: Database,
              bot: Bot,
              workspace_service: WorkspaceService,
              audit_logger: TelegramAuditLogger,
          ) -> None:
              await _handle_workspace_reference_callback(
                  callback,
                  callback_data,
                  personal_reference_context,
                  database,
                  bot,
                  workspace_service,
                  audit_logger,
              )


          async def _handle_workspace_reference_callback(
          '''
          source = source.replace(helper, wrapper, 1)
          router_path.write_text(source, encoding="utf-8")

          integrity_path = Path("tests/test_project_integrity.py")
          integrity = integrity_path.read_text(encoding="utf-8")
          marker = '    "refadd",\n}'
          replacement = '''    "refadd",
              "refdel",
              "refdone",
              "refcancel",
              "compare_ref",
              "compare_reference",
          }'''
          if marker not in integrity:
              raise SystemExit("duplicate command allowlist marker not found")
          integrity_path.write_text(
              integrity.replace(marker, replacement, 1),
              encoding="utf-8",
          )
          PY

      - name: Regenerate official inventories
        run: |
          python scripts/inventory_architecture_layout.py --write --label workspace-reference-library
          python scripts/inventory_repository_layout.py --write --label workspace-reference-library
          python scripts/update_p2_stability_inventory.py --label workspace-reference-library --schema-version 49
          python scripts/telegram_navigation_inventory.py --root velvet_bot --markdown docs/generated/telegram_navigation_inventory.md

      - name: Commit generated files and remove temporary workflow
        run: |
          rm .github/workflows/tmp-regenerate-workspace-reference-inventories.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Refresh workspace reference inventories"
          git push origin HEAD:agent/workspace-reference-library
