name: temp polish workspace guided navigation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  polish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-guided-menu-navigation
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Apply navigation polish
        run: python tools/temp_polish_workspace_guided_navigation.py

      - name: Refresh navigation and stability inventories
        run: |
          python scripts/update_p2_stability_inventory.py --label workspace-guided-menu-navigation --schema-version 57
          python scripts/telegram_navigation_inventory.py --root velvet_bot --markdown docs/generated/telegram_navigation_inventory.md

      - name: Validate
        run: |
          python -m compileall -q velvet_bot tests
          python scripts/telegram_navigation_inventory.py --root velvet_bot --check
          git diff --check

      - name: Commit polish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Polish guided workspace back navigation"
          git push origin HEAD:agent/workspace-guided-menu-navigation
