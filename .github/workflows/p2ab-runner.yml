name: p2ab runner

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2ab-quality-sets-safe-edit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply production update
        run: python .github/scripts/p2ab_apply.py
      - name: Update P2AB documents
        run: python .github/scripts/p2ab_docs.py
      - name: Regenerate stability inventory
        run: python scripts/update_p2_stability_inventory.py --label p2ab-quality-sets-safe-edit --schema-version 30
      - name: Remove temporary files
        run: |
          rm .github/scripts/p2ab_apply.py
          rm .github/scripts/p2ab_docs.py
          rm .github/workflows/p2ab-runner.yml
      - name: Commit generated result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Complete P2AB quality sets safe edit"
          git push origin HEAD:${{ github.head_ref }}
