name: Apply watermark presentation contracts

on:
  push:
    branches:
      - agent/watermark-presentation-contracts
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-slice:
    if: github.event_name == 'pull_request' || github.event.head_commit.message != 'Apply watermark presentation contracts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/watermark-presentation-contracts
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Apply canonical UI contract
        run: python .github/apply-watermark-ui-contract.py
      - name: Apply Krita wake contract
        run: python .github/apply-krita-wake-contract.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run focused validation
        run: |
          python -m compileall \
            velvet_bot/watermark_ui.py \
            velvet_bot/krita_supervisor.py \
            velvet_bot/presentation/telegram/routers/core_operations_controllers/watermark.py \
            velvet_bot/presentation/telegram/routers/core_operations_controllers/workspace_product_experience.py \
            velvet_bot/presentation/telegram/routers/public_archive/watermark_actions.py \
            tests/test_watermark_presentation_contracts.py
          python -m unittest -v \
            tests.test_watermark_presentation_contracts \
            tests.test_workspace_commands_and_watermark_drafts \
            tests.test_watermark_draft_persistence_boundary \
            tests.test_workspace_taxonomy_watermark_reliability
      - name: Remove transformation scripts
        run: |
          rm .github/apply-watermark-ui-contract.py
          rm .github/apply-krita-wake-contract.py
      - name: Commit applied slice
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Apply watermark presentation contracts"
          git push origin HEAD:agent/watermark-presentation-contracts
