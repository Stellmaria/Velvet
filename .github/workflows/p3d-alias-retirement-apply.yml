name: apply verified P3D alias retirement

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply verified local patch
        shell: bash
        run: |
          cat .github/pr223/part* > /tmp/pr223.patch.gz.b64
          echo "e02ff2afee9f0e2dcdf75fc007438eeaa2169a8061d0a90988cae5fa87112fe8  /tmp/pr223.patch.gz.b64" | sha256sum -c -
          base64 -d /tmp/pr223.patch.gz.b64 | gzip -d > /tmp/pr223.patch
          git apply --index /tmp/pr223.patch
          rm -rf .github/pr223
          rm -f .github/workflows/p3d-alias-retirement-apply.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor: retire archive and reference handler aliases"
          git push
