name: apply verified P3D alias retirement

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply verified compact patch
        shell: bash
        run: |
          cat .github/pr223v3/part* > /tmp/pr223.patch.gz.b64
          echo "c33095bd6c96371e73bf003f2819f130fddcc6c66928eb4c1c8531c9d3d70b39  /tmp/pr223.patch.gz.b64" | sha256sum -c -
          base64 -d /tmp/pr223.patch.gz.b64 | gzip -d > /tmp/pr223.patch
          git apply --check /tmp/pr223.patch
          git apply --index /tmp/pr223.patch
          rm -rf .github/pr223 .github/pr223v2 .github/pr223v3
          rm -f .github/workflows/p3d-alias-retirement-apply.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor: retire archive and reference handler aliases"
          git push
