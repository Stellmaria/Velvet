name: p3d alias retirement snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/upload-artifact@v4
        with:
          name: p3d-alias-retirement-snapshot
          path: .
          include-hidden-files: true
          retention-days: 1
