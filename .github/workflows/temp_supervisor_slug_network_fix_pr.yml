name: temp supervisor fix PR runner

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Extract patch script
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/temp_supervisor_slug_network_fix.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n\n      - name: Refresh generated inventories"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          script = textwrap.dedent(source[start:end])
          Path('/tmp/apply_fix.py').write_text(script, encoding='utf-8')
          PY

      - name: Run patch script
        run: |
          set -o pipefail
          python /tmp/apply_fix.py 2>&1 | tee /tmp/supervisor-fix.log

      - name: Upload patch log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: supervisor-fix-log
          path: /tmp/supervisor-fix.log
          if-no-files-found: warn

      - name: Refresh generated inventories
        run: |
          python scripts/inventory_architecture_layout.py --write --label p3d-analytics-alias-retirement
          python scripts/update_p2_stability_inventory.py --label supervisor-test-slug-network-fix --schema-version 55
          python scripts/inventory_repository_layout.py --write --label p3e-repository-layout-complete
          python scripts/telegram_navigation_inventory.py --root velvet_bot --markdown docs/generated/telegram_navigation_inventory.md

      - name: Commit fixes
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add velvet_bot velvet_supervisor tests docs .env.example
          if ! git diff --cached --quiet; then
            git commit -m "Fix Supervisor tests workspace slugs and network noise"
            git push origin HEAD:${{ github.head_ref }}
          fi
