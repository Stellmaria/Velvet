name: apply verified character story alias retirement

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply verified local patch
        shell: bash
        run: |
          cat .github/pr225/part* > /tmp/pr225.patch.gz.b64
          echo "6c1f29bda29e703e835bd2ec098da92c73e1a091e60ac347fbb5139302f96a3c  /tmp/pr225.patch.gz.b64" | sha256sum -c -
          base64 -d /tmp/pr225.patch.gz.b64 | gzip -d > /tmp/pr225.patch
          git apply --check /tmp/pr225.patch
          git apply --index /tmp/pr225.patch
          rm -rf .github/pr225
          rm -f .github/workflows/p3d-character-story-alias-apply.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor: retire character story handler aliases"
          git push
