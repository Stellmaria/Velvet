name: p2x runner

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2x-publication-report-boundary'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply P2X
        run: |
          python scripts/_p2x_apply.py
          python scripts/update_p2_stability_inventory.py --label p2x-publication-report-boundary --schema-version 26
          python scripts/_p2x_docs.py
          rm scripts/_p2x_apply.py scripts/_p2x_docs.py .github/workflows/p2x-runner.yml
      - name: Commit generated result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(p2x): harden publication failure reporting"
          git push origin HEAD:${{ github.head_ref }}
