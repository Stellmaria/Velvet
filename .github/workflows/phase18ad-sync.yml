name: phase18ad sync docs

on:
  push:
    branches:
      - agent/phase18ad-public-media-lookup

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase18ad-public-media-lookup
          fetch-depth: 0

      - name: Synchronize Phase 18AD baseline and project notes
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          def replace_exact(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one occurrence, found {count}: {old!r}')
              target.write_text(text.replace(old, new), encoding='utf-8')

          baseline_path = Path('docs/private_pool_inventory.json')
          baseline = json.loads(baseline_path.read_text(encoding='utf-8'))
          files = [item for item in baseline['files'] if item['path'] != 'velvet_bot/public_media_lookup.py']
          if len(files) != len(baseline['files']) - 1:
              raise SystemExit('public_media_lookup.py baseline entry was not removed exactly once')
          baseline['generated_from_commit'] = 'e0f0c98ff852733b40680e0a56aec16fe2b04c36'
          baseline['total_external_findings'] = 62
          baseline['total_files'] = 17
          baseline['next_slice'] = {
              'phase': '18AE',
              'target': 'velvet_bot/discussion_thread_links.py',
          }
          baseline['files'] = files
          baseline_path.write_text(
              json.dumps(baseline, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          replace_exact(
              'tests/test_phase18m_private_pool_inventory.py',
              'self.assertEqual(63, len(inventory.external_findings(findings)))\n        self.assertEqual(18, len(inventory.summarize_external(findings)))',
              'self.assertEqual(62, len(inventory.external_findings(findings)))\n        self.assertEqual(17, len(inventory.summarize_external(findings)))',
          )

          replace_exact(
              'docs/private_pool_inventory.md',
              'Последний завершённый срез: Фаза 18AC, Telegram import persistence в `telegram_export_import.py`.',
              'Последний завершённый срез: Фаза 18AD, public media lookup в `public_media_lookup.py`.',
          )
          replace_exact(
              'docs/private_pool_inventory.md',
              '- 63 внешних обращения к `Database._require_pool()`;\n- 18 production-файлов;',
              '- 62 внешних обращения к `Database._require_pool()`;\n- 17 production-файлов;',
          )
          replace_exact(
              'docs/private_pool_inventory.md',
              '| Legacy query-модули | 49 | постепенно превращать в repositories/queries, не ограничиваться заменой метода |',
              '| Legacy query-модули | 48 | постепенно превращать в repositories/queries, не ограничиваться заменой метода |',
          )
          replace_exact('docs/private_pool_inventory.md', 'Всего: 63.', 'Всего: 62.')
          replace_exact(
              'docs/private_pool_inventory.md',
              '- Фаза 18AC: Telegram import persistence, удалены 4 обращения и 1 production-файл; source registration, discussion filters, SHA-256 duplicate short-circuit и единая import transaction сохранены.',
              '- Фаза 18AC: Telegram import persistence, удалены 4 обращения и 1 production-файл; source registration, discussion filters, SHA-256 duplicate short-circuit и единая import transaction сохранены.\n- Фаза 18AD: public media lookup, удалено 1 обращение и 1 production-файл; newest-first `ROW_NUMBER()` offset query и `int | None` mapping сохранены.',
          )
          replace_exact(
              'docs/private_pool_inventory.md',
              '1. **Фаза 18AD:** public media lookup, 1 connection point.\n2. Discussion thread linking и analytics reactions отдельным малым срезом.',
              '1. **Фаза 18AE:** discussion thread linking и analytics reactions, 2 connection points.\n2. Alias management и character aliases последующими срезами.',
          )
          replace_exact(
              'docs/private_pool_inventory.md',
              '- media sets;\n- public media lookup;\n- discussion thread linking.',
              '- media sets;\n- discussion thread linking.',
          )

          replace_exact(
              'docs/project_memory.md',
              'Статус: срезы 18A–18AC реализованы, baseline продолжает уменьшаться.',
              'Статус: срезы 18A–18AD реализованы, baseline продолжает уменьшаться.',
          )
          replace_exact(
              'docs/project_memory.md',
              '- 18AC: Telegram import persistence в `telegram_export_import.py`.',
              '- 18AC: Telegram import persistence в `telegram_export_import.py`;\n- 18AD: public media lookup query в `public_media_lookup.py`.',
          )
          replace_exact(
              'docs/project_memory.md',
              '- после 18AC: 63 обращения в 18 файлах;\n- repository-классы внутри крупных модулей, backup infrastructure и Telegram import persistence полностью удалены из baseline;',
              '- после 18AC: 63 обращения в 18 файлах;\n- после 18AD: 62 обращения в 17 файлах;\n- repository-классы внутри крупных модулей, backup infrastructure, Telegram import persistence и public media lookup полностью удалены из baseline;',
          )
          replace_exact(
              'docs/project_memory.md',
              'Следующий срез: **18AD, public media lookup query boundary**, 1 connection point.',
              'Следующий срез: **18AE, discussion thread links и analytics reactions**, 2 connection points.',
          )
          replace_exact(
              'docs/project_memory.md',
              '1. Фаза 18AD: public media lookup query boundary, baseline 63 → 62.',
              '1. Фаза 18AE: discussion thread links и analytics reactions, baseline 62 → 60.',
          )

          replace_exact(
              'docs/development_status.md',
              'Статус: срезы 18A–18AC реализованы, работа продолжается.',
              'Статус: срезы 18A–18AD реализованы, работа продолжается.',
          )
          replace_exact(
              'docs/development_status.md',
              '- Telegram import persistence в `telegram_export_import.py`.',
              '- Telegram import persistence в `telegram_export_import.py`;\n- public media lookup query в `public_media_lookup.py`.',
          )
          replace_exact(
              'docs/development_status.md',
              '- после 18AC: 63 в 18 файлах;\n- repository-классы внутри крупных модулей, backup infrastructure и Telegram import persistence полностью удалены из baseline;',
              '- после 18AC: 63 в 18 файлах;\n- после 18AD: 62 в 17 файлах;\n- repository-классы внутри крупных модулей, backup infrastructure, Telegram import persistence и public media lookup полностью удалены из baseline;',
          )
          replace_exact(
              'docs/development_status.md',
              'Следующий срез: **18AD, public media lookup query boundary**, 1 connection point. Ожидаемый baseline: 62 обращения в 17 файлах.',
              'Следующий срез: **18AE, discussion thread links и analytics reactions**, 2 connection points. Ожидаемый baseline: 60 обращений в 15 файлах.',
          )
          replace_exact(
              'docs/development_status.md',
              '1. Фаза 18AD: public media lookup query boundary.',
              '1. Фаза 18AE: discussion thread links и analytics reactions.',
          )

          replace_exact(
              'CHANGELOG.md',
              'runtime Backup Service, базовый Backup Service и Telegram import persistence больше не обращаются к приватному `_require_pool()`;',
              'runtime Backup Service, базовый Backup Service, Telegram import persistence и public media lookup больше не обращаются к приватному `_require_pool()`;',
          )
          replace_exact(
              'CHANGELOG.md',
              '- private pool baseline уменьшен с 130 обращений в 35 production-файлах до 63 обращений в 18 файлах;',
              '- private pool baseline уменьшен с 130 обращений в 35 production-файлах до 62 обращений в 17 файлах;',
          )
          replace_exact(
              'CHANGELOG.md',
              '- repository-классы внутри крупных модулей, весь backup infrastructure и Telegram import persistence удалены из private pool baseline;',
              '- repository-классы внутри крупных модулей, весь backup infrastructure, Telegram import persistence и public media lookup удалены из private pool baseline;',
          )

          Path('.github/workflows/phase18ad-sync.yml').unlink()
          PY

      - name: Commit synchronized Phase 18AD state
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/private_pool_inventory.json docs/private_pool_inventory.md docs/project_memory.md docs/development_status.md CHANGELOG.md tests/test_phase18m_private_pool_inventory.py .github/workflows/phase18ad-sync.yml
          git commit -m "docs: синхронизировать baseline после Фазы 18AD"
          git push origin HEAD:agent/phase18ad-public-media-lookup
