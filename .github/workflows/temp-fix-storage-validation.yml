name: temporary storage validation patch

on:
  push:
    branches:
      - agent/fix-storage-backup-validation-json
    paths:
      - .github/workflows/temp-fix-storage-validation.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-storage-backup-validation-json
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Patch JSONB decoding and tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          repo_path = Path('velvet_bot/domains/telegram_storage/repository.py')
          text = repo_path.read_text(encoding='utf-8')
          text = text.replace(
              'import json\nfrom dataclasses import dataclass\n',
              'import json\nimport logging\nfrom collections.abc import Mapping\nfrom dataclasses import dataclass\n',
              1,
          )
          marker = '''from velvet_bot.domains.telegram_storage.models import (\n    MigrationSummary,\n    StorageCandidate,\n    StoredObject,\n    StoredPart,\n    StorageKind,\n)\n\n\n'''
          helper = '''from velvet_bot.domains.telegram_storage.models import (\n    MigrationSummary,\n    StorageCandidate,\n    StoredObject,\n    StoredPart,\n    StorageKind,\n)\n\nlogger = logging.getLogger(__name__)\n\n\ndef _decode_json_object(value: Any) -> dict[str, Any]:\n    """Return a JSON object regardless of asyncpg JSONB codec configuration."""\n    if value is None:\n        return {}\n    if isinstance(value, Mapping):\n        return dict(value)\n    if isinstance(value, (bytes, bytearray, memoryview)):\n        try:\n            value = bytes(value).decode("utf-8")\n        except UnicodeDecodeError:\n            logger.warning("Backup validation JSONB contains non-UTF-8 bytes")\n            return {}\n    if isinstance(value, str):\n        if not value.strip():\n            return {}\n        try:\n            decoded = json.loads(value)\n        except json.JSONDecodeError:\n            logger.warning("Backup validation JSONB contains malformed JSON")\n            return {}\n        if isinstance(decoded, Mapping):\n            return dict(decoded)\n        logger.warning(\n            "Backup validation JSONB decoded to %s instead of an object",\n            type(decoded).__name__,\n        )\n        return {}\n    logger.warning(\n        "Backup validation JSONB has unsupported runtime type %s",\n        type(value).__name__,\n    )\n    return {}\n\n\n'''
          if marker not in text:
              raise SystemExit('repository import marker not found')
          text = text.replace(marker, helper, 1)
          old = '                    validation=dict(row["validation"] or {}),\n'
          new = '                    validation=_decode_json_object(row["validation"]),\n'
          if old not in text:
              raise SystemExit('validation conversion line not found')
          text = text.replace(old, new, 1)
          repo_path.write_text(text, encoding='utf-8')

          test_path = Path('tests/test_telegram_storage_center.py')
          tests = test_path.read_text(encoding='utf-8')
          tests = tests.replace(
              'from velvet_bot.domains.telegram_storage.models import (\n',
              'from velvet_bot.domains.telegram_storage.repository import (\n    TelegramStorageRepository,\n    _decode_json_object,\n)\nfrom velvet_bot.domains.telegram_storage.models import (\n',
              1,
          )
          insertion = r'''

class TelegramStorageBackupValidationTests(unittest.IsolatedAsyncioTestCase):
    def test_json_object_decoder_accepts_asyncpg_jsonb_shapes(self) -> None:
        expected = {"verified": True, "tables": 42}
        self.assertEqual(expected, _decode_json_object(expected))
        self.assertEqual(expected, _decode_json_object('{"verified":true,"tables":42}'))
        self.assertEqual(expected, _decode_json_object(b'{"verified":true,"tables":42}'))
        self.assertEqual({}, _decode_json_object(None))
        self.assertEqual({}, _decode_json_object('[]'))
        self.assertEqual({}, _decode_json_object('{broken'))

    async def test_backup_backfill_decodes_jsonb_string_without_blocking_scan(self) -> None:
        class _Acquire:
            def __init__(self, connection) -> None:
                self.connection = connection

            async def __aenter__(self):
                return self.connection

            async def __aexit__(self, exc_type, exc, tb) -> None:
                return None

        with tempfile.TemporaryDirectory() as directory:
            root = Path(directory)
            dump = root / 'daily.dump'
            dump.write_bytes(b'backup')
            connection = SimpleNamespace(
                fetch=AsyncMock(
                    return_value=[
                        {
                            'id': 17,
                            'backup_kind': 'daily',
                            'file_path': str(dump),
                            'file_name': dump.name,
                            'sha256': 'a' * 64,
                            'schema_version': 'z003',
                            'validation': '{"verified":true,"table_count":42}',
                        }
                    ]
                )
            )
            database = SimpleNamespace(acquire=lambda: _Acquire(connection))
            repository = TelegramStorageRepository(database)

            items = await repository.list_backup_backfill(root)

        self.assertEqual(1, len(items))
        self.assertEqual(17, items[0].run_id)
        self.assertEqual(
            {"verified": True, "table_count": 42},
            items[0].validation,
        )
'''
          anchor = '\n\nclass TelegramStorageSourceContractTests(unittest.TestCase):\n'
          if anchor not in tests:
              raise SystemExit('test insertion anchor not found')
          tests = tests.replace(anchor, insertion + anchor, 1)
          test_path.write_text(tests, encoding='utf-8')

          worklog = Path('docs/worklog/2026-07-21-storage-backup-validation-json.md')
          worklog.write_text('''# Сессия: Storage backup validation JSON decoding\n\n- Дата: 2026-07-21\n- ID: `2026-07-21-storage-backup-validation-json`\n- Линия/фаза: Telegram Storage production repair\n- Статус: `завершено`\n- Ветка: `agent/fix-storage-backup-validation-json`\n- Базовый commit: `34a0810056ad44fe53fc7c9b3b90fabf2008c1e4`\n\n## Перед началом\n\n### Цель\n\nУстранить ежечасное падение Telegram Storage при чтении поля `backup_runs.validation` и возобновить выгрузку резервных копий.\n\n### Исходный контекст\n\nПлановые проходы `run=2`–`run=9` завершались `ValueError` в `list_backup_backfill`. PostgreSQL-колонка имеет тип JSONB, но текущий asyncpg codec возвращает строку JSON, которую код ошибочно передавал в `dict()`.\n\n### Планируемый объём\n\n- единый декодер JSON object для runtime-форм JSONB;\n- замена прямого `dict(value)` в backup backfill;\n- regression-тест строки JSONB и полного вызова репозитория;\n- без миграций и без изменений channel analytics.\n\n### Критерии готовности\n\n- JSONB-строка преобразуется в словарь;\n- пустые и повреждённые необязательные metadata не останавливают storage scan;\n- backup backfill возвращает элементы без исключения;\n- полный CI проходит.\n\n### Риски и ограничения\n\nПовреждённая или не-object validation metadata заменяется пустым словарём с предупреждением в логах. Сам backup-файл при этом не удаляется до успешной загрузки и индексации.\n\n## После завершения\n\n### Фактически сделано\n\nДобавлен безопасный декодер для mapping, JSON string, UTF-8 bytes и пустого значения. `list_backup_backfill` использует его вместо `dict()` над строкой.\n\n### Миграции и совместимость\n\nМиграции не требуются. Тип `backup_runs.validation JSONB` и формат сохранённых записей не менялись. Исправление совместимо как со стандартным asyncpg string codec, так и с подключениями, возвращающими готовый mapping.\n\n### Проверки\n\nДобавлены unit-проверки всех поддержанных runtime-форм и async repository test с реальной временной backup-копией. Полный CI запускается в PR.\n\n### PR и commit\n\nPR создаётся из `agent/fix-storage-backup-validation-json`; итоговый merge commit фиксируется после зелёного CI.\n\n### Незавершённое\n\nПосле развёртывания требуется эксплуатационный проход `/storage_migrate force`, чтобы подтвердить отправку накопленных backups в ветку 4 и локальную очистку.\n\n### Следующий шаг\n\nОбновить Supervisor, перезапустить бота и выполнить принудительный storage scan, не ожидая следующего часового запуска.\n''', encoding='utf-8')

          Path('.github/workflows/temp-fix-storage-validation.yml').unlink()
          PY
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix backup validation JSONB decoding"
          git push origin HEAD:agent/fix-storage-backup-validation-json
