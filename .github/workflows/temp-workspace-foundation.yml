name: temporary workspace foundation patcher

on:
  push:
    branches:
      - agent/workspace-foundation

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/workspace-foundation
          fetch-depth: 0

      - name: Apply workspace foundation patch
        run: python scripts/temp_workspace_foundation_patch.py

      - name: Commit result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Scope characters by workspace"
          git push origin HEAD:agent/workspace-foundation
