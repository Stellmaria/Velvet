name: apply verified P3D zero-consumer patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Apply verified local patch
        shell: bash
        run: |
          base64 -d .github/p3d-pr222.patch.gz.b64 | gzip -d > /tmp/pr222.patch
          git apply --index --exclude=.github/workflows/p3d-source-snapshot.yml /tmp/pr222.patch
          rm -f .github/p3d-pr222.patch.gz.b64
          rm -f .github/workflows/p3d-source-snapshot.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "refactor: remove production legacy handler consumers"
          git push
