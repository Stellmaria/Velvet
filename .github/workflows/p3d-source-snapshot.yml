name: p3d source snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: p3d-source-snapshot
          path: .
          include-hidden-files: true
          retention-days: 1
