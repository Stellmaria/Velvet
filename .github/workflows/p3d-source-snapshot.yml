name: p3d apply verified patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Apply verified local patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/p3d-consumer-slice.patch.gz.b64 | gzip -d > /tmp/p3d.patch
          git apply --check /tmp/p3d.patch
          git apply /tmp/p3d.patch
          rm .github/p3d-consumer-slice.patch.gz.b64
          rm .github/workflows/p3d-source-snapshot.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor: inventory legacy handler consumers"
          git push origin HEAD:${{ github.head_ref }}
