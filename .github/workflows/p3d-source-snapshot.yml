name: apply verified archive and P3D patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply verified local patch
        shell: bash
        run: |
          base64 -d .github/pr221.patch.gz.b64 | gzip -d > /tmp/pr221.patch
          git apply --index /tmp/pr221.patch
          rm -f .github/pr221.patch.gz.b64
          rm -f .github/workflows/p3d-source-snapshot.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: make archive deletion idempotent and clean multi-story imports"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
