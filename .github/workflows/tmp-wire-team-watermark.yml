name: temporary wire workspace team and watermark

on:
  push:
    branches:
      - agent/workspace-team-watermark

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/workspace-team-watermark
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply wiring patch
        run: python tools/tmp_wire_team_watermark.py
      - name: Commit wiring
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Wire workspace team and custom watermark logo"
          git push origin HEAD:agent/workspace-team-watermark
