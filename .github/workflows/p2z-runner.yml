name: p2z runner

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2z-manual-quality-job-boundary'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply P2Z
        run: |
          python scripts/_p2z_apply.py
          python scripts/update_p2_stability_inventory.py --label p2z-manual-quality-job-boundary --schema-version 28
          python scripts/_p2z_docs.py
          rm scripts/_p2z_apply.py scripts/_p2z_docs.py .github/workflows/p2z-runner.yml
      - name: Commit generated result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "test(p2z): verify manual quality compensation"
          git push origin HEAD:${{ github.head_ref }}
