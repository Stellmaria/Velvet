name: p2k runner

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/p2k-backup-service-boundaries'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/p2k-backup-service-boundaries
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python .github/scripts/p2k_apply.py
      - run: python .github/scripts/p2k_finalize.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm .github/scripts/p2k_apply.py .github/scripts/p2k_finalize.py .github/workflows/p2k-runner.yml
          git add -A
          git commit -m "P2K update"
          git push origin HEAD:agent/p2k-backup-service-boundaries
