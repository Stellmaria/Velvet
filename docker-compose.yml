services:
  postgres:
    image: postgres:16-alpine
    container_name: velvet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-velvet}
      POSTGRES_USER: ${POSTGRES_USER:-velvet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - velvet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: velvet-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-velvet}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-velvet}
      BACKUP_DIR: /app/backups
      PG_DUMP_PATH: pg_dump
      PG_RESTORE_PATH: pg_restore
      AI_VISION_BASE_URL: ${AI_VISION_BASE_URL:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./runtime:/app/runtime
    healthcheck:
      test: ["CMD", "python", "scripts/container_healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: velvet-ollama
    profiles: ["ai"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - velvet_ollama_data:/root/.ollama

volumes:
  velvet_postgres_data:
  velvet_ollama_data:
