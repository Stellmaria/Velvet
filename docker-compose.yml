services:
  postgres:
    image: postgres:18-alpine
    container_name: velvet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: velvet
      POSTGRES_USER: velvet
      POSTGRES_PASSWORD: velvet_password
    ports:
      - "5432:5432"
    volumes:
      - velvet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velvet -d velvet"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  velvet_postgres_data:
